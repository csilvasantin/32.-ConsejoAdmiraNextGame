<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Consejero · AdmiraNext Council</title>
  <meta name="admiranext-version" content="v.26.06.21.r1">
  <link rel="icon" href="/council-icon.ico?v=20260522-r1" sizes="any">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a14; --bg2:#0d1024; --ink:#e7e7ef; --muted:#9aa0b4;
      --wood:#2a1a08; --wood-line:#8b5a14; --amber:#ffdd66; --amber-soft:#f0c040;
      --red:#e74c3c; --blue:#3498db; --green:#44bb44;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Press Start 2P',monospace;
      background:
        radial-gradient(1200px 600px at 50% -10%, #181d3a 0%, transparent 60%),
        linear-gradient(180deg,#0a0a14,#0a0a14 60%,#070710);
      color:var(--ink); min-height:100vh; padding:14px;
      image-rendering:pixelated; -webkit-font-smoothing:none;
    }
    a{color:inherit;text-decoration:none}
    .wrap{max-width:1040px;margin:0 auto}

    /* barra superior estilo home */
    .bar{display:flex;gap:8px;flex-wrap:wrap;align-items:stretch;margin-bottom:18px}
    .pill{
      background:var(--wood);border:2px solid var(--wood-line);color:var(--amber);
      font-size:.46rem;line-height:1.5;letter-spacing:.5px;padding:.55rem .7rem;
      box-shadow:2px 2px 0 #000;display:flex;align-items:center;gap:6px;white-space:nowrap;
      cursor:pointer;transition:.12s;
    }
    .pill:hover{background:var(--wood-line);border-color:var(--amber-soft);color:#fff}
    .pill.flat{cursor:default}
    .bar-spacer{flex:1 1 auto}

    /* hero */
    .hero{
      display:grid;grid-template-columns:200px 1fr;gap:20px;align-items:stretch;
      border:3px solid var(--wood-line);background:linear-gradient(180deg,#12162e,#0c0f22);
      box-shadow:5px 5px 0 #000;padding:18px;
    }
    .portrait{
      border:3px solid #000;outline:2px solid var(--wood-line);outline-offset:-5px;
      background-repeat:no-repeat;background-color:#05060d;
      image-rendering:pixelated;min-height:240px;position:relative;
    }
    .portrait .seat{
      position:absolute;left:0;bottom:0;right:0;font-size:.42rem;color:var(--amber);
      background:linear-gradient(0deg,rgba(0,0,0,.85),transparent);padding:14px 8px 7px;
    }
    .hmeta{display:flex;flex-direction:column;justify-content:center;gap:12px;min-width:0}
    .role-chip{
      display:inline-flex;align-items:center;gap:8px;align-self:flex-start;
      background:var(--wood);border:2px solid var(--wood-line);color:var(--amber);
      font-size:.5rem;padding:.4rem .6rem;box-shadow:2px 2px 0 #000;
    }
    .name{font-size:1.5rem;line-height:1.25;color:#fff;text-shadow:3px 3px 0 #000;word-break:break-word}
    .badges{display:flex;gap:8px;flex-wrap:wrap}
    .badge{font-size:.44rem;padding:.35rem .5rem;border:2px solid #000;box-shadow:2px 2px 0 #000}
    .b-racional{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}
    .b-creativo{background:linear-gradient(135deg,#2980b9,#3498db);color:#fff}
    .b-gen{background:#1a1f3d;color:var(--amber);border-color:var(--wood-line)}
    .b-alias{background:#0c2417;color:#7CFFb0;border-color:#1f6b44}
    .terr{font-size:.6rem;line-height:1.8;color:var(--amber-soft)}

    /* secciones */
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
    .card{
      border:2px solid var(--wood-line);background:#0c0f22;box-shadow:4px 4px 0 #000;padding:14px;
    }
    .card h2{font-size:.6rem;color:var(--amber);margin-bottom:12px;letter-spacing:1px}
    .row{display:flex;justify-content:space-between;gap:10px;font-size:.5rem;line-height:1.7;
      padding:7px 0;border-bottom:1px dashed #2a3057}
    .row:last-child{border-bottom:0}
    .row .k{color:var(--muted)}
    .row .v{color:var(--ink);text-align:right}
    .dot{display:inline-block;width:8px;height:8px;margin-right:6px;vertical-align:middle}

    .bio{border:2px solid var(--wood-line);background:#0c0f22;box-shadow:4px 4px 0 #000;
      padding:18px;margin-top:14px}
    .bio h2{font-size:.6rem;color:var(--amber);margin-bottom:14px;letter-spacing:1px}
    .bio p{font-size:.58rem;line-height:2;color:#d7dcf0;margin-bottom:14px;font-family:'Press Start 2P',monospace}
    .bio p:last-child{margin-bottom:0}
    .quote{
      border-left:4px solid var(--amber-soft);background:#12081e22;margin-top:14px;padding:14px 16px;
      font-size:.6rem;line-height:2;color:var(--amber);font-style:normal
    }
    .quote .who{display:block;margin-top:10px;font-size:.44rem;color:var(--muted)}

    .cta{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    .cta .pill{font-size:.5rem;padding:.7rem .9rem}
    .cta .go{background:var(--wood-line);color:#fff;border-color:var(--amber-soft)}

    /* Chat con el consejero (vía AgoraMatrix → reflejo en Telegram) */
    .chat{margin-top:14px}
    .chat-status{font-size:.42rem;color:var(--muted);letter-spacing:0}
    .chat-status.on{color:#7CFC00}.chat-status.off{color:#e0623c}
    .chat-thread{min-height:90px;max-height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:6px 2px;margin-bottom:12px}
    .chat-empty{font-size:.5rem;color:var(--muted);line-height:1.9;text-align:center;padding:20px 10px}
    .chat-msg{font-size:.5rem;line-height:1.7;padding:8px 10px;border:1px solid #2a3057;max-width:88%}
    .chat-msg.me{align-self:flex-end;background:#15183a;border-color:var(--amber-soft);color:#fff}
    .chat-msg.them{align-self:flex-start;background:#0c0f22;color:#d7dcf0}
    .chat-msg .who{display:block;font-size:.4rem;color:var(--muted);margin-bottom:4px}
    .chat-form{display:flex;gap:8px}
    .chat-form input{flex:1;background:#080a18;border:2px solid var(--wood-line);color:var(--ink);font:inherit;font-size:.5rem;padding:.7rem .8rem}
    .chat-form input:disabled{opacity:.5}
    .chat-form button{background:var(--wood-line);color:#fff;border:2px solid var(--amber-soft);font:inherit;font-size:.5rem;padding:.7rem 1rem;cursor:pointer}
    .chat-form button:disabled{opacity:.45;cursor:not-allowed}

    .foot{text-align:center;color:var(--muted);font-size:.42rem;line-height:2;margin:22px 0 6px}

    .notfound{border:2px solid var(--red);background:#1a0a0a;padding:18px;font-size:.6rem;
      line-height:2;color:#ffb3b3;box-shadow:4px 4px 0 #000}

    @media(max-width:720px){
      .hero{grid-template-columns:1fr}
      .portrait{min-height:280px}
      .grid{grid-template-columns:1fr}
      .name{font-size:1.15rem}
    }
  </style>
</head>

        quote:"Si haces reír a la gente, te dejan entrar.",
        bio:[
          "Es el narrador viral: marca construida con humor, oportunidad y dominio de la cultura de internet. En el Consejo representa que una buena historia, contada con ingenio, abre todas las puertas.",
          "Sabe que si haces reír a la gente te dejan entrar, y convierte campañas en conversación y producto en cultura. Domina el timing, la autoironía y el aprovechar el momento justo para que la marca se comparta sola.",
          "Cierra el lado creativo contemporáneo y hace pareja con el CEO coetáneo, Elon Musk: entre la ambición radical y la narrativa viral ponen visión e ingenio a trabajar juntos."
        ] },
    ];

    const BY_SLUG = {};
    COUNCIL.forEach(c => { c.slug = slugify(c.persona); BY_SLUG[c.slug] = c; });

    function cropStyle(c){
      // Recorta la cara del consejero desde la imagen de grupo (coords body en % de la imagen).
      const {l,t,w,h} = c.crop;
      const sx = (10000/w).toFixed(1), sy = (10000/h).toFixed(1);
      const px = (l/(100-w)*100).toFixed(2), py = (t/(100-h)*100).toFixed(2);
      return `background-image:url('${IMG[c.gen]}');background-size:${sx}% ${sy}%;background-position:${px}% ${py}%;`;
    }

    function render(){
      const params = new URLSearchParams(location.search);
      const slug = slugify(params.get("p") || params.get("persona") || "steve-jobs");
      const c = BY_SLUG[slug];
      const app = document.getElementById("app");

      if(!c){
        document.title = "Consejero no encontrado · AdmiraNext Council";
        app.innerHTML = `
          <div class="bar">
            <a class="pill" href="index.html">◀ Volver al Consejo</a>
            <span class="bar-spacer"></span>
            <span class="pill flat">v.26.06.21.r1</span>
          </div>
          <div class="notfound">No encuentro al consejero «${(params.get("p")||"").replace(/[<>]/g,"")}».<br><br>
            Consejeros disponibles: ${Object.keys(BY_SLUG).join(" · ")}</div>`;
        return;
      }

      document.title = `${c.persona} · ${c.role} · AdmiraNext Council`;
      const sideLabel = c.side === "racional" ? "Racional" : "Creativo";
      const genLabel = c.gen === "leyendas" ? "Leyenda" : "Coetáneo";
      const aliasBadge = c.alias ? `<span class="badge b-alias">Matrix · ${c.alias}</span>` : "";

      app.innerHTML = `
        <div class="bar">
          <a class="pill" href="index.html">◀ Consejo</a>
          <a class="pill" href="https://www.admiranext.com" target="_blank" rel="noopener">🏠 AdmiraNeXT</a>
          <span class="bar-spacer"></span>
          <span class="pill flat">${c.icon} ${c.role}</span>
          <span class="pill flat">v.26.06.21.r1</span>
        </div>

        <div class="hero">
          <div class="portrait" style="${cropStyle(c)}">
            <div class="seat">${c.role} · ${sideLabel}</div>
          </div>
          <div class="hmeta">
            <span class="role-chip">${c.icon} ${c.role} — ${c.roleFull}</span>
            <div class="name">${c.persona}</div>
            <div class="badges">
              <span class="badge b-${c.side}">${sideLabel}</span>
              <span class="badge b-gen">${genLabel}</span>
              ${aliasBadge}
            </div>
            <div class="terr">“${c.territory}”</div>
          </div>
        </div>

        <div class="grid">
          <div class="card">
            <h2>En el Consejo</h2>
            <div class="row"><span class="k">Rol</span><span class="v">${c.role} · ${c.roleFull}</span></div>
            <div class="row"><span class="k">Lado</span><span class="v">${sideLabel}</span></div>
            <div class="row"><span class="k">Generación</span><span class="v">${genLabel}</span></div>
            <div class="row"><span class="k">Pareja</span><span class="v">${c.pair} · ${c.pairPersona}</span></div>
            ${c.alias ? `<div class="row"><span class="k">Alias Matrix</span><span class="v">${c.alias}</span></div>`:""}
          </div>
          <div class="card" id="asig">
            <h2>Asignación</h2>
            <div class="row"><span class="k">Operador</span><span class="v">${c.member || "—"}</span></div>
            <div class="row"><span class="k">Máquina</span><span class="v">${c.machine || "—"}</span></div>
            <div class="row"><span class="k">Territorio</span><span class="v">${c.territory}</span></div>
          </div>
        </div>

        <div class="bio">
          <h2>Quién es en AdmiraNeXT</h2>
          ${c.bio.map(p=>`<p>${p}</p>`).join("")}
          <div class="quote">“${c.quote}”<span class="who">— ${c.persona}, ${c.role} del Consejo</span></div>
        </div>

        <div class="card chat" id="chat">
          <h2>💬 Conversación <span class="chat-status" id="chatStatus">· comprobando conexión…</span></h2>
          <div class="chat-thread" id="chatThread"><div class="chat-empty">Conecta a ${c.persona} a un equipo con su LLM (Asignación) para conversar. La charla se refleja en Telegram.</div></div>
          <form class="chat-form" id="chatForm" autocomplete="off">
            <input id="chatInput" type="text" placeholder="Escribe a ${c.persona}…" disabled>
            <button type="submit" id="chatSend" disabled>Enviar</button>
          </form>
        </div>

        <div class="cta">
          <a class="pill go" href="index.html#${c.slug}">💬 Preguntarle en el Consejo</a>
          <a class="pill" href="reunion.html">🤝 Llevarle a una reunión</a>
          <a class="pill" href="sala.html">🏛️ Sala del Consejo</a>
          <a class="pill" href="index.html">◀ Volver a la mesa</a>
        </div>

        <div class="foot">
          AdmiraNeXT · Consejo de Silicio · admira.live<br>
          Ficha de consejero · v.26.06.21.r1
        </div>`;

      loadLive(c);
    }

    // Asignación real desde /equipos (auto-login en máquinas de la tailnet).
    async function fetchOperatorToken(){
      try{ const r=await fetch("https://macmini.tail48b61c.ts.net:8443/optoken/token",{signal:AbortSignal.timeout(2500)}); if(!r.ok)return null; const d=await r.json(); return d&&d.token?d.token:null; }catch(e){ return null; }
    }
    async function loadLive(c){
      const asig=document.getElementById("asig"); if(!asig) return;
      let token=localStorage.getItem("council_hack_token")||"";
      if(!token){ token=await fetchOperatorToken()||""; if(token) localStorage.setItem("council_hack_token",token); }
      if(!token) return;  // sin token: se quedan los valores estáticos
      try{
        const r=await fetch("https://macmini.tail48b61c.ts.net/council/api/council/teams",{headers:{"X-Council-Hack-Token":token},signal:AbortSignal.timeout(9000)});
        if(!r.ok) return;
        const d=await r.json();
        const aid=(c.role||"").toLowerCase();
        const asg=(d.assignments||{})[aid]; if(!asg) return;
        const mach=(d.machines||[]).find(m=>m.id===asg.machine);
        const user=(d.usuarios||[]).find(u=>u.id===asg.usuario);
        const RL={codex:"Codex",claude:"Claude",opencode:"OpenCode"};
        const rt=RL[asg.runtime]||asg.runtime||"—";
        const acc=(user&&user.account)||"";
        const ident=(RL[asg.runtime]&&acc)?(RL[asg.runtime]+"·"+acc):"";
        const task=ident?((d.identities||{})[ident]):null;
        const esc=s=>String(s==null?"":s).replace(/[<>&]/g,x=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[x]));
        const row=(k,v)=>`<div class="row"><span class="k">${k}</span><span class="v">${v}</span></div>`;
        asig.innerHTML=`<h2>Asignación</h2>`
          +row("Máquina", mach?esc(mach.name):"— sin asignar —")
          +row("LLM / runtime", esc(rt))
          +row("Operador", user?esc(user.name):"—")
          +row("Territorio", esc(c.territory))
          +((task&&task.text)?row("Tarea", esc(task.text)+(task.persona?` <span style="opacity:.6">· ${esc(task.persona)}</span>`:"")):"");
        try{ setupChat(c,{machine:mach?mach.name:"",machineId:asg.machine||"",runtime:rt,runtimeId:asg.runtime||"",identity:ident,account:acc,token}); }catch(_){}
      }catch(e){}
    }

    // Chat con el consejero: enruta por AgoraMatrix a su agente (Codex/Claude/OpenCode)
    // en su máquina; el agente responde en persona y se refleja en Telegram. El hilo se
    // lee del council-api. Si el backend (fase 2) aún no responde, queda en "pendiente".
    const CHAT_API="https://macmini.tail48b61c.ts.net/council";
    function setupChat(c, ctx){
      const st=document.getElementById("chatStatus"), inp=document.getElementById("chatInput"),
            btn=document.getElementById("chatSend"), form=document.getElementById("chatForm"),
            thread=document.getElementById("chatThread");
      if(!st||!form) return;
      const esc=s=>String(s==null?"":s).replace(/[<>&]/g,x=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[x]));
      if(!ctx.machineId||!ctx.identity){ st.textContent="· sin equipo asignado"; st.className="chat-status off"; return; }
      st.textContent="· conectado a "+ctx.machine+" · "+ctx.runtime+" ("+ctx.identity+")"; st.className="chat-status on";
      inp.disabled=false; btn.disabled=false; let since=0, primed=false;
      function bubble(who,text,me){ if(!primed){ thread.innerHTML=""; primed=true; } const d=document.createElement("div");
        d.className="chat-msg "+(me?"me":"them"); d.innerHTML='<span class="who">'+esc(who)+'</span>'+esc(text);
        thread.appendChild(d); thread.scrollTop=thread.scrollHeight; }
      form.addEventListener("submit", async e=>{ e.preventDefault(); const msg=inp.value.trim(); if(!msg)return; inp.value=""; bubble("Tú",msg,true);
        try{ const r=await fetch(CHAT_API+"/api/council/talk",{method:"POST",headers:{"Content-Type":"application/json","X-Council-Hack-Token":ctx.token},
              body:JSON.stringify({role:c.role,persona:c.persona,identity:ctx.identity,runtime:ctx.runtimeId,machine:ctx.machineId,message:msg})});
          if(r.status===404){ st.textContent="· enrutado pendiente (backend fase 2)"; st.className="chat-status off"; }
          else if(!r.ok){ bubble("sistema","error "+r.status,false); }
        }catch(_){ bubble("sistema","sin conexión",false); }
      });
      async function poll(){ try{ const r=await fetch(CHAT_API+"/api/council/talk-thread?role="+encodeURIComponent(c.role)+"&since="+since,{headers:{"X-Council-Hack-Token":ctx.token}});
        if(r.ok){ const d=await r.json(); for(const m of (d.messages||[])){ since=Math.max(since,m.ts||0); if((m.from||"")!=="Tú"&&(m.role||"")!=="me") bubble(m.from||c.persona, m.text||"", false); } } }catch(_){} }
      setInterval(poll,4000); poll();
    }

    render();
    window.addEventListener("popstate", render);
  </script>
</body>
</html>
