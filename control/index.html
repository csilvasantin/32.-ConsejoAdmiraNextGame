<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/admira-bar.js?v=scumm"></script>
    <script src="/auth-gate.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="/failover.js"></script>
<title>Control · AdmiraNext Fleet</title>
<style>
  :root{
    --bg:#0b0e14;--panel:#131822;--panel2:#1a212e;--line:#26303f;--ink:#e8eef7;--mut:#8a97ab;
    --acc:#5bd6c0;--acc2:#7aa2ff;--warn:#ffb454;--bad:#ff6b6b;--ok:#5bd6c0;
    --mono:'SF Mono',ui-monospace,Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{background:radial-gradient(120% 90% at 50% 0%,#101622,#0b0e14);color:var(--ink);font-family:var(--sans)}
  header{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid var(--line)}
  header h1{font-size:17px;margin:0;font-weight:800;letter-spacing:.3px}
  header h1 .tag{color:var(--acc);font-family:var(--mono)}
  header .sub{color:var(--mut);font-size:12px}
  .spacer{flex:1}
  .pill{font-size:11px;border:1px solid var(--line);border-radius:999px;padding:5px 11px;color:var(--mut);cursor:pointer}
  .pill.ok{color:var(--ok);border-color:var(--ok)}
  .pill.bad{color:var(--bad);border-color:var(--bad)}
  .wrap{max-width:1100px;margin:0 auto;padding:22px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:10px}
  .card .top{display:flex;align-items:center;gap:11px}
  .card .em{font-size:30px;line-height:1}
  .card .nm{font-weight:700;font-size:15px}
  .card .role{color:var(--mut);font-size:12px}
  .dot{width:10px;height:10px;border-radius:50%;background:#5a6678;flex:none;display:inline-block}
  .dot.on{background:var(--ok);box-shadow:0 0 9px var(--ok)}
  .info{font-family:var(--mono);font-size:11.5px;color:var(--mut);white-space:pre-wrap;line-height:1.6;min-height:18px}
  .shot{position:relative;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#000;cursor:zoom-in;display:none}
  .shot img{width:100%;display:block}
  .shot.isWall::after{content:'🖥️ fondo actual · pulsa 📸 captura para foto real';position:absolute;left:0;right:0;bottom:0;font-size:10px;padding:3px 7px;background:rgba(0,0,0,.55);color:#9fe6c0;letter-spacing:.2px}
  .acts{display:flex;flex-wrap:wrap;gap:6px}
  button{font-family:inherit;cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:9px;padding:6px 10px;font-size:12px;transition:.12s}
  button:hover{border-color:var(--acc);color:#fff}
  button:disabled{opacity:.45;cursor:progress}
  button.primary{background:var(--acc);color:#06231e;border-color:var(--acc);font-weight:700}
  .console{margin-top:18px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px}
  .console h3{margin:0 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--mut)}
  .crow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  select,input[type=text]{font-family:inherit;background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13px;outline:none}
  input[type=text]{flex:1;min-width:200px;font-family:var(--mono)}
  select:focus,input:focus{border-color:var(--acc2)}
  .out{margin-top:12px;display:flex;flex-direction:column;gap:8px;max-height:340px;overflow:auto}
  .res{border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .res .h{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#161d28;font-size:12px}
  .res .h .who{font-weight:700}
  .res .h .rc{margin-left:auto;font-family:var(--mono);font-size:11px}
  .res .h .rc.ok{color:var(--ok)} .res .h .rc.err{color:var(--bad)}
  .res pre{margin:0;padding:9px 11px;font-family:var(--mono);font-size:11.5px;line-height:1.5;white-space:pre-wrap;color:#cdd8e8;max-height:200px;overflow:auto}
  .empty{color:var(--mut);font-size:13px;text-align:center;padding:18px}
  .note{color:var(--mut);font-size:11px;margin-top:8px}
  #lb{position:fixed;inset:0;background:#000d;display:none;align-items:center;justify-content:center;z-index:99;cursor:zoom-out;padding:20px}
  #lb img{max-width:100%;max-height:100%;border-radius:10px;box-shadow:0 10px 50px #000}

  /* ── Sillas del Consejo (movido de la home) ── */
  .council-seats{margin-bottom:20px}
  .cseat-head{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
  .cseat-title{font-weight:800;font-size:15px}
  .cseat-gen{display:flex;gap:6px;margin-left:auto}
  .cgen{font-size:11px;padding:5px 11px;border:1px solid var(--line);border-radius:999px;background:var(--panel2);color:var(--mut);cursor:pointer}
  .cgen.active{color:#fff;border-color:var(--acc)}
  .cseat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:760px){.cseat-grid{grid-template-columns:1fr}}
  .cpanel{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .cpanel.racional{border-top:3px solid #e74c3c}
  .cpanel.creativo{border-top:3px solid #3498db}
  .cpanel-title{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;font-weight:700;font-size:13px;user-select:none}
  .cpanel-title .ctcount{margin-left:auto;color:var(--mut);font-size:11px;font-family:var(--mono)}
  .cpanel-title .carrow{color:var(--mut);font-size:10px;transition:.15s}
  .cpanel.collapsed .cpanel-body{display:none}
  .cpanel.collapsed .carrow{transform:rotate(-90deg)}
  .cpanel-body{padding:6px 10px 12px;display:flex;flex-direction:column;gap:6px}
  .cmember{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--line);border-radius:10px;background:var(--panel2)}
  .cmember .cdot{width:9px;height:9px;border-radius:50%;background:#5a6678;flex:none}
  .cmember .cdot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .cmember .cic{font-size:20px;line-height:1}
  .cmember .cinfo{flex:1;min-width:0}
  .cmember .cname{font-weight:700;font-size:13px}
  .cmember .crole{color:var(--mut);font-size:11px}
  .cmember .cmach{font-family:var(--mono);font-size:10.5px;color:var(--mut);text-align:right;white-space:nowrap;line-height:1.4}
  .cmember a.cficha{color:var(--acc2);font-size:11px;text-decoration:none;white-space:nowrap;border:1px solid var(--line);border-radius:7px;padding:4px 7px}
  .cmember a.cficha:hover{border-color:var(--acc2)}
</style>
</head>
<body>
<header>
  <h1>Fleet<span class="tag">Control</span></h1>
  <span class="sub">control de la flota · AdmiraNext</span>
  <span class="spacer"></span>
  <span class="pill" id="connPill" title="estado de conexión">conectando…</span>
  <span class="pill" id="tokenPill" title="cambiar token">🔑 token</span>
</header>

<div class="wrap">
  <div class="council-seats">
    <div class="cseat-head">
      <span class="cseat-title">🪑 Sillas del Consejo</span>
      <div class="cseat-gen">
        <button class="cgen active" data-gen="leyendas">⭐ Leyendas</button>
        <button class="cgen" data-gen="coetaneos">🚀 Coetáneos</button>
      </div>
    </div>
    <div class="cseat-grid">
      <div class="cpanel racional" id="cpanel-racional">
        <div class="cpanel-title" data-toggle="cpanel-racional">🧠 Racional <span class="ctcount">🔴 Sillas rojas · <span id="ccount-racional">0/4</span></span> <span class="carrow">▼</span></div>
        <div class="cpanel-body" id="cmembers-racional"></div>
      </div>
      <div class="cpanel creativo" id="cpanel-creativo">
        <div class="cpanel-title" data-toggle="cpanel-creativo">🎨 Creativo <span class="ctcount">🔵 Sillas azules · <span id="ccount-creativo">0/4</span></span> <span class="carrow">▼</span></div>
        <div class="cpanel-body" id="cmembers-creativo"></div>
      </div>
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="console">
    <h3>⌘ Consola</h3>
    <div class="crow">
      <select id="csMachine"></select>
      <input type="text" id="csCmd" placeholder="comando shell… (p.ej. uptime; df -h /)" autocomplete="off">
      <button class="primary" id="csRun">▶ ejecutar</button>
      <button id="csClear">limpiar</button>
    </div>
    <div class="note">El comando se ejecuta de verdad en la máquina elegida (MacMini local · 16/14 por SSH). Requiere token.</div>
    <div class="out" id="out"><div class="empty">Sin resultados todavía.</div></div>
  </div>
</div>

<div id="lb"><img id="lbImg" alt=""></div>

<script>
const API='https://macmini.tail48b61c.ts.net/fleet/api';
const $=s=>document.querySelector(s);
let TOKEN=localStorage.getItem('fleet_token')||'';
let MACHINES=[];

/* ---------- fondo de pantalla (persona) por máquina ----------
   Mientras no haya captura real, cada equipo muestra el fondo de la persona que tiene
   activa en ese momento (Neo/Morfeo/Trinity/Oráculo/Cypher), leído del worker del diario. */
const DIARY_API='https://admira-telegram.csilvasantin.workers.dev';
const _norm=s=>(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
const _personaFile={Neo:'Neo',Morfeo:'Morfeo',Trinity:'Trinity','Oráculo':'Oraculo',Oraculo:'Oraculo',Cypher:'Cypher'};
let PERSONA_BY_MACHINE={};
async function loadPersonas(){
  try{
    const r=await fetch(DIARY_API+'/api/presence',{cache:'no-store'});
    const d=await r.json(); const map={};
    (d.presence||[]).slice().sort((a,b)=>b.updated-a.updated).forEach(p=>{
      const k=_norm(p.machine); if(k && !map[k]) map[k]=p.persona; // la persona más reciente por máquina
    });
    PERSONA_BY_MACHINE=map;
  }catch(e){ /* sin presencia: las tarjetas quedan sin fondo, sin icono roto */ }
}
function personaWallpaper(name){
  const f=_personaFile[PERSONA_BY_MACHINE[_norm(name)]];
  return f ? '/wallpapers/'+f+'.png' : '';
}

function setToken(){
  const t=prompt('Token de FleetControl:', TOKEN||'');
  if(t!==null){ TOKEN=t.trim(); localStorage.setItem('fleet_token',TOKEN); refresh(); }
}
$('#tokenPill').onclick=setToken;
function hdrs(){ return {'Content-Type':'application/json','X-Fleet-Token':TOKEN}; }
async function api(path, opts){
  const r=await fetch(API+path,{...opts,headers:{...hdrs(),...(opts&&opts.headers||{})}});
  if(r.status===401){ throw {code:401,msg:'token inválido o ausente'}; }
  return r.json();
}

/* ---------- estado de la flota ---------- */
async function refresh(){
  if(!TOKEN){ $('#connPill').textContent='🔑 falta token'; $('#connPill').className='pill bad'; renderCards([]); return; }
  try{
    const d=await api('/status'); MACHINES=d.machines;
    const up=MACHINES.filter(m=>m.online).length;
    $('#connPill').textContent='🟢 '+up+'/'+MACHINES.length+' online'; $('#connPill').className='pill ok';
    await loadPersonas();
    renderCards(MACHINES); fillSelect();
  }catch(e){
    $('#connPill').textContent = e.code===401 ? '🔑 token inválido' : '🔴 sin conexión';
    $('#connPill').className='pill bad'; if(e.code===401) renderCards([]);
  }
}
function renderCards(ms){
  const el=$('#cards');
  if(!ms.length){ el.innerHTML='<div class="empty" style="grid-column:1/-1">Introduce el token (🔑) para ver la flota.</div>'; return; }
  // preserva miniaturas ya cargadas
  const shots={}; document.querySelectorAll('.shot').forEach(s=>{ if(s.dataset.m && s.style.display!=='none') shots[s.dataset.m]=s.querySelector('img').src; });
  el.innerHTML=ms.map(m=>`
    <div class="card">
      <div class="top">
        <span class="em">${m.emoji||'💻'}</span>
        <div><div class="nm">${m.name} <span class="dot ${m.online?'on':''}"></span></div>
        <div class="role">${m.role||''}${m.local?' · local':' · ssh'}</div></div>
      </div>
      <div class="info">${m.online?(m.info||'').replace(/</g,'&lt;'):'— sin respuesta —'}</div>
      <div class="shot" data-m="${m.id}"><img alt="captura ${m.name}"></div>
      <div class="acts" ${m.online?'':'style="opacity:.4;pointer-events:none"'}>
        <button data-a="screenshot" data-m="${m.id}">📸 captura</button>
        <button data-a="sysinfo" data-m="${m.id}">🩺 info</button>
        <button data-a="volume" data-m="${m.id}">🔊 volumen</button>
        <button data-a="displaysleep" data-m="${m.id}">😴 pantalla</button>
        <button data-a="say" data-m="${m.id}">🗣️ decir</button>
        <button data-a="notify" data-m="${m.id}">🔔 avisar</button>
        <button data-a="open" data-m="${m.id}">📂 abrir app</button>
        <button data-a="closeapp" data-m="${m.id}">❌ cerrar app</button>
        <button data-a="ssh" data-m="${m.id}">🔌 ssh</button>
      </div>
    </div>`).join('');
  // restaura miniaturas
  Object.keys(shots).forEach(id=>showShot(id, shots[id]));
  // por defecto: el fondo (persona) de cada máquina hasta que se pida captura real
  ms.forEach(m=>{ if(!shots[m.id]){ const w=personaWallpaper(m.name); if(w) setDefaultShot(m.id, w); } });
}

function showShot(machineId, src){
  const box=document.querySelector('.shot[data-m="'+machineId+'"]'); if(!box) return;
  box.classList.remove('isWall');
  box.querySelector('img').src=src; box.style.display='block';
  box.onclick=()=>{ $('#lbImg').src=src; $('#lb').style.display='flex'; };
}

// Fondo de pantalla de la persona como miniatura por defecto (hasta una captura real).
function setDefaultShot(machineId, src){
  const box=document.querySelector('.shot[data-m="'+machineId+'"]'); if(!box) return;
  const img=box.querySelector('img');
  img.onerror=()=>{ box.style.display='none'; };  // si falla, nada de icono roto
  img.src=src; box.style.display='block'; box.classList.add('isWall');
  box.onclick=()=>{ $('#lbImg').src=src; $('#lb').style.display='flex'; };
}
$('#lb').onclick=()=>{ $('#lb').style.display='none'; };

/* ---------- acciones rápidas ---------- */
const NEEDS_ARG={ volume:'Volumen 0-100:', say:'¿Qué digo?', notify:'Texto del aviso:', open:'¿Qué app abrir? (p.ej. Safari)', closeapp:'¿Qué app cerrar? (p.ej. Safari)' };
$('#cards').addEventListener('click', async e=>{
  const b=e.target.closest('button[data-a]'); if(!b) return;
  const action=b.dataset.a, machine=b.dataset.m;
  // ssh: acción de cliente — copia el comando para conectar de verdad desde tu terminal.
  if(action==='ssh'){
    const m=MACHINES.find(x=>x.id===machine)||{};
    const cmd = m.local ? 'ssh '+(m.user||'csilvasantin')+'@'+(m.host||'localhost') : 'ssh '+(m.user||'csilvasantin')+'@'+(m.host||'');
    try{ await navigator.clipboard.writeText(cmd); pushResult(machine,'🔌 ssh',{rc:0,stdout:'Comando copiado al portapapeles:\n  '+cmd+'\nPégalo en tu Terminal para una sesión real.',ms:0}); }
    catch(_){ prompt('Copia este comando para conectar por SSH:', cmd); }
    return;
  }
  // cerrar app: vía /api/run (no requiere acción nueva en el backend del Mini).
  if(action==='closeapp'){
    const app=prompt(NEEDS_ARG.closeapp,''); if(app===null||!app.trim()) return;
    const esc=app.replace(/"/g,'');
    b.disabled=true; const lbl0=b.textContent; b.textContent='❌ …';
    try{ const d=await api('/run',{method:'POST',body:JSON.stringify({machine,cmd:'osascript -e \'quit app "'+esc+'"\' && echo "cerrada: '+esc+'"'})}); pushResult(machine,'❌ cerrar '+esc,d); }
    catch(err){ pushResult(machine,'❌ cerrar app',{rc:-1,stdout:'',stderr:err.msg||'error'}); }
    b.disabled=false; b.textContent=lbl0; return;
  }
  let arg='';
  if(NEEDS_ARG[action]){ arg=prompt(NEEDS_ARG[action], action==='volume'?'50':''); if(arg===null) return; }
  b.disabled=true; const lbl=b.textContent; if(action==='screenshot') b.textContent='📸 …';
  try{
    const d=await api('/action',{method:'POST',body:JSON.stringify({machine,action,arg})});
    if(action==='screenshot'){
      if(d.rc===0 && d.stdout && !/ERR_NO_CAPTURE/.test(d.stdout)){ showShot(machine,'data:image/jpeg;base64,'+d.stdout); pushResult(machine,'📸 captura',{rc:0,stdout:'(imagen arriba)',ms:d.ms}); }
      else pushResult(machine,'📸 captura',{rc:d.rc||1,stdout:'',stderr:d.stderr||'no se pudo capturar (¿permiso de Grabación de pantalla a AgoraCapture?)'});
    } else pushResult(machine, '⚡ '+action+(arg?(' '+arg):''), d);
  }catch(err){ pushResult(machine,'⚡ '+action,{rc:-1,stdout:'',stderr:err.msg||'error'}); }
  b.disabled=false; b.textContent=lbl;
});

/* ---------- consola libre ---------- */
function fillSelect(){
  const s=$('#csMachine'); const cur=s.value;
  s.innerHTML=MACHINES.map(m=>`<option value="${m.id}">${m.emoji||''} ${m.name}${m.online?'':' (offline)'}</option>`).join('');
  if(cur) s.value=cur;
}
async function runCmd(){
  const machine=$('#csMachine').value, cmd=$('#csCmd').value.trim(); if(!cmd) return;
  $('#csRun').disabled=true;
  try{ const d=await api('/run',{method:'POST',body:JSON.stringify({machine,cmd})}); pushResult(machine,'$ '+cmd,d); }
  catch(err){ pushResult(machine,'$ '+cmd,{rc:-1,stdout:'',stderr:err.msg||'error'}); }
  $('#csRun').disabled=false;
}
$('#csRun').onclick=runCmd;
$('#csCmd').addEventListener('keydown',e=>{ if(e.key==='Enter') runCmd(); });
$('#csClear').onclick=()=>{ $('#out').innerHTML='<div class="empty">Sin resultados todavía.</div>'; };

function pushResult(machine, label, d){
  const m=MACHINES.find(x=>x.id===machine)||{name:machine,emoji:''};
  const out=$('#out'); if(out.querySelector('.empty')) out.innerHTML='';
  const body=((d.stdout||'')+(d.stderr?('\n⚠️ '+d.stderr):'')).trim()||'(sin salida)';
  const ok=d.rc===0;
  const div=document.createElement('div'); div.className='res';
  div.innerHTML=`<div class="h"><span class="who">${m.emoji||''} ${m.name}</span><span style="color:var(--mut)">${label.replace(/</g,'&lt;').slice(0,80)}</span>
    <span class="rc ${ok?'ok':'err'}">rc=${d.rc}${d.ms!=null?(' · '+d.ms+'ms'):''}</span></div>
    <pre>${body.replace(/</g,'&lt;')}</pre>`;
  out.insertBefore(div, out.firstChild);
}

/* ---------- auto-login en máquinas de AgoraMatrix (tailnet) ---------- */
// El Mini sirve el TOKEN_OPERADOR sólo a nodos de la tailnet identificados
// (puerto 8443, NO funnel). En tus Macs entra solo; desde fuera, pide token.
async function fetchOperatorToken(){
  try{
    const r = await fetch('https://macmini.tail48b61c.ts.net:8443/optoken/token', { signal: AbortSignal.timeout(2500) });
    if(!r.ok) return null;
    const d = await r.json();
    return d && d.token ? d.token : null;
  }catch(e){ return null; }
}

/* ---------- arranque ---------- */
(async () => {
  if(!TOKEN){
    const auto = await fetchOperatorToken();
    if(auto){ TOKEN = auto; localStorage.setItem('fleet_token', TOKEN); }
  }
  if(!TOKEN) setTimeout(setToken, 300);
  refresh();
  setInterval(refresh, 8000);
})();
</script>

    {name:"CTO",role:"Chief Technology Officer",persona:"Jensen Huang",side:"racional",gen:"coetaneos",icon:"⚙️",machineId:"admira-macbookpronegro14",machine:"MacBook Pro Negro 14"},
    {name:"COO",role:"Chief Operations Officer",persona:"Gwynne Shotwell",side:"racional",gen:"coetaneos",icon:"📋",machineId:"admira-macbookairplata",machine:"MacBook Air Plata"},
    {name:"CFO",role:"Chief Financial Officer",persona:"Ruth Porat",side:"racional",gen:"coetaneos",icon:"💰",machineId:"admira-macmini",machine:"Mac Mini"},
    {name:"CCO",role:"Chief Creative Officer",persona:"John Lasseter",side:"creativo",gen:"coetaneos",icon:"💡",machineId:"admira-macbookairluna",machine:"MacBook Air Luna"},
    {name:"CDO",role:"Chief Design Officer",persona:"Jony Ive",side:"creativo",gen:"coetaneos",icon:"🎨",machineId:"admira-macbookairazul",machine:"MacBook Air Azul"},
    {name:"CXO",role:"Chief Experience Officer",persona:"Carlos Ratti",side:"creativo",gen:"coetaneos",icon:"🧭",machineId:"admira-pctwin",machine:"AdmiraTwin (PC)"},
    {name:"CSO",role:"Chief Storytelling Officer",persona:"Ryan Reynolds",side:"creativo",gen:"coetaneos",icon:"📖",machineId:"admira-macbookaircrema",machine:"MacBook Air Crema"},
  ];
  const SEATS=4, SRC="/machines.json";
  let gen="leyendas", online={};
  const $=id=>document.getElementById(id);
  function cslug(s){return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");}
  async function loadStatus(){
    try{
      const r=await fetch(SRC+"?t="+Date.now(),{signal:AbortSignal.timeout(5000)});
      const d=await r.json(); online={};
      (d.machines||[]).forEach(m=>{ online[m.id]=["online","idle","busy"].includes(m.status); });
    }catch(e){}
  }
  function render(){
    const box={racional:$("cmembers-racional"),creativo:$("cmembers-creativo")};
    box.racional.innerHTML=""; box.creativo.innerHTML="";
    const c={racional:0,creativo:0};
    COUNCIL.filter(m=>m.gen===gen).forEach(m=>{
      const on=!!(m.machineId&&online[m.machineId]); if(on)c[m.side]++;
      const el=document.createElement("div"); el.className="cmember";
      el.innerHTML='<span class="cdot '+(on?'on':'')+'"></span><span class="cic">'+m.icon+'</span>'+
        '<div class="cinfo"><div class="cname">'+m.name+' — '+m.persona+'</div><div class="crole">'+m.role+'</div></div>'+
        '<div class="cmach">'+m.machine+'<br>'+(on?'online':'offline')+'</div>'+
        '<a class="cficha" href="/consejero.html?p='+cslug(m.persona)+'" target="_blank" rel="noopener">ficha →</a>';
      box[m.side].appendChild(el);
    });
    $("ccount-racional").textContent=c.racional+"/"+SEATS;
    $("ccount-creativo").textContent=c.creativo+"/"+SEATS;
  }
  document.querySelectorAll(".cpanel-title").forEach(t=>t.addEventListener("click",()=>$(t.dataset.toggle).classList.toggle("collapsed")));
  document.querySelectorAll(".cgen").forEach(b=>b.addEventListener("click",()=>{
    document.querySelectorAll(".cgen").forEach(x=>x.classList.remove("active"));
    b.classList.add("active"); gen=b.dataset.gen; render();
  }));
  (async()=>{ await loadStatus(); render(); setInterval(async()=>{await loadStatus();render();},30000); })();
})();
</script>
<script>
/* Fusiona el <header> de FleetControl (marca + estado online + token) dentro de
 * la barra superior de navegación (#admira-topbar, la de admira-bar.js) → una sola
 * fila, ganando el alto que ocupaba la segunda barra. Mueve los nodos reales
 * (#connPill/#tokenPill conservan sus IDs, listeners y actualizaciones de refresh). */
(function mergeBars(){
  var top=document.getElementById('admira-topbar');
  var header=document.querySelector('header');
  if(!top||!header){ return setTimeout(mergeBars,60); }
  if(top.dataset.merged) return; top.dataset.merged='1';
  // pills (online/token) con el mismo look SCUMM ámbar de la barra
  var st=document.createElement('style');
  st.textContent="#admira-topbar .pill{font-family:'Press Start 2P',monospace;font-size:8px;line-height:1.5;"
    +"border:2px solid #8b5a14;border-radius:0;background:#2a1a08;color:#ffdd66;box-shadow:2px 2px 0 #000;"
    +"padding:6px 9px;align-self:center;letter-spacing:.5px}"
    +"#admira-topbar .pill.ok{color:#7CFC00;border-color:#5a7a2e}"
    +"#admira-topbar .pill.bad{color:#ff6b6b;border-color:#7a3030}";
  document.head.appendChild(st);
  var sp=document.createElement('span'); sp.style.cssText='flex:1 1 auto';
  top.appendChild(sp);
  var cp=document.getElementById('connPill'), tp=document.getElementById('tokenPill');
  if(cp) top.appendChild(cp);
  if(tp) top.appendChild(tp);
  header.remove();
})();
</script>
