<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonar · ¿Qué máquina es este navegador?</title>
  <style>
    :root{
      --bg:#050806; --ink:#7dffb0; --dim:#2f6b4a; --acc:#5bd6c0; --acc2:#7aa2ff;
      --bad:#ff6b6b; --warn:#ffb454;
      --mono:'SF Mono',ui-monospace,Menlo,Consolas,monospace;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%}
    body{
      background:radial-gradient(120% 90% at 50% 15%,#0a140d,#050806);
      color:var(--ink);font-family:var(--mono);
      display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;
      text-shadow:0 0 6px rgba(125,255,176,.35);
    }
    /* scanlines CRT */
    body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9;
      background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0,rgba(0,0,0,.16) 1px,transparent 2px,transparent 3px)}
    .crt{position:relative;z-index:1;width:100%;max-width:720px;text-align:center}
    .kicker{font-size:12px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:10px}
    .state{font-size:12px;letter-spacing:2px;color:var(--acc);text-transform:uppercase;margin-bottom:22px;
      opacity:.85;min-height:16px}
    .machine{font-size:clamp(34px,9vw,88px);font-weight:800;line-height:1.05;letter-spacing:1px;
      word-break:break-word;margin:0 0 14px}
    .machine.err{color:var(--bad);text-shadow:0 0 8px rgba(255,107,107,.4)}
    .did{font-size:clamp(14px,3vw,20px);color:var(--acc2);letter-spacing:1px;
      text-shadow:0 0 6px rgba(122,162,255,.35)}
    .meta{margin-top:26px;font-size:12px;color:var(--dim);letter-spacing:1px;line-height:1.9}
    .meta b{color:var(--ink)}
    .blink{animation:bk 1.1s steps(2,start) infinite}
    @keyframes bk{to{opacity:0}}
    .hint{margin-top:30px;font-size:11.5px;color:var(--dim);letter-spacing:.5px;line-height:1.7;max-width:560px;
      margin-left:auto;margin-right:auto}
    a{color:var(--acc)}
  </style>
</head>
<body>
  <main class="crt">
    <div class="kicker">📡 Sonar de flota · AdmiraNeXT</div>
    <div class="state" id="state">interrogando localhost<span class="blink">…</span></div>
    <h1 class="machine" id="machine">·····</h1>
    <div class="did" id="did"></div>
    <div class="meta" id="meta"></div>
    <div class="hint">
      Este navegador pregunta a su propio <b>executor local</b> (127.0.0.1) quién es.
      Si aparece un nombre, ESTE navegador vive en ESA máquina.
      «SIN EXECUTOR» = la máquina no corre <code>navegadores.executor</code> (p.ej. Windows/Zenbook)
      o el daemon está caído.
    </div>
  </main>
  <script>
    // El executor levanta un http local (127.0.0.1). 8766 es el canónico; probamos
    // alternativas por si en esa máquina el puerto está ocupado por otro daemon.
    const PORTS = [8766, 8767, 8768];
    const $ = id => document.getElementById(id);

    async function probe(port){
      const ctrl = new AbortController();
      const to = setTimeout(()=>ctrl.abort(), 900);
      try{
        const r = await fetch(`http://127.0.0.1:${port}/whoami`, {signal:ctrl.signal, cache:'no-store'});
        clearTimeout(to);
        if(!r.ok) return null;
        const d = await r.json();
        if(d && d.machine) return {...d, port};
        return null;
      }catch(e){ clearTimeout(to); return null; }
    }

    async function sonar(){
      for(const p of PORTS){
        const d = await probe(p);
        if(d){ show(d); return; }
      }
      fail();
    }

    function show(d){
      $('state').innerHTML = '● EXECUTOR VIVO';
      $('state').style.color = 'var(--acc)';
      $('machine').textContent = d.machine;
      $('machine').classList.remove('err');
      $('did').textContent = d.deviceId;
      const t = d.ts ? new Date(d.ts).toLocaleTimeString('es-ES') : '—';
      $('meta').innerHTML = `puerto <b>${d.port}</b> · reportado <b>${t}</b>`;
      document.title = '📡 ' + d.machine;
    }

    function fail(){
      $('state').innerHTML = '○ SIN RESPUESTA';
      $('state').style.color = 'var(--warn)';
      $('machine').textContent = 'SIN EXECUTOR';
      $('machine').classList.add('err');
      $('did').textContent = 'máquina desconocida';
      $('meta').innerHTML = `probados 127.0.0.1: ${PORTS.join(', ')} · sin daemon`;
      document.title = '📡 SIN EXECUTOR';
    }

    sonar();
    setInterval(sonar, 4000);
  </script>
</body>
</html>
