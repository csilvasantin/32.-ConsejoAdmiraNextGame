<!DOCTYPE html>
<!-- players · v.2026.07.10.r1 · página PROPIA de admira.tv: pantallas emitiendo (plano de CONTENIDO) + mando remoto en vivo.
     MUDANZA desde /control (sección «Pantallas · Players»): tarjetas grandes + D-pad visible + doble tick (1 enviado / 2 recibido).
     Fuentes en producción: GET api.admira.store/signage/screens · GET /signage/now · POST omnipublicity-api…/control/cmd + /control/seen. -->
<html lang="es">
<head>
  <script src="/auth-gate.js?v=20260708-authfix"></script>
  <script src="/admira-bar.js?v=20260710-players"></script>
  <script src="/failover.js"></script>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Players · AdmiraNext Fleet</title>
  <style>
    :root{
      --bg:#0b0e14;--panel:#131822;--panel2:#1a212e;--line:#26303f;--ink:#e8eef7;--mut:#8a97ab;
      --acc:#5bd6c0;--acc2:#7aa2ff;--warn:#ffb454;--bad:#ff6b6b;--ok:#5bd6c0;
      --mono:'SF Mono',ui-monospace,Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}
    body{background:radial-gradient(120% 90% at 50% 0%,#141007,#0b0e14);color:var(--ink);font-family:var(--sans)}

    /* ── Cabecera (madera + ámbar SCUMM) ── */
    header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:16px 24px;
      border-bottom:2px solid #8b5a14;background:linear-gradient(180deg,#1b130a,#120c04)}
    header h1{font-size:19px;margin:0;font-weight:800;letter-spacing:.4px;color:#ffe08a}
    header h1 .tag{color:var(--acc2);font-family:var(--mono);font-size:15px}
    header .sub{color:#c9a86a;font-size:12.5px}
    .spacer{flex:1}
    .pill{font-size:12px;border:1px solid #8b5a14;border-radius:999px;padding:6px 13px;color:#ffdd66;
      font-family:var(--mono);background:#2a1a08;box-shadow:1px 1px 0 #000}
    .pill b.on{color:var(--ok)}

    /* ── Escenario: donde viven las tarjetas (contexto .stage = look SCUMM) ── */
    .stage{max-width:1260px;margin:0 auto;padding:26px 22px 70px;min-height:calc(100vh - 130px)}

    /* ══ PANTALLAS · PLAYERS (plano de CONTENIDO) — heredado de /control, con más aire ══ */
    .screens-sec{margin-top:4px}
    .screens-hd{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:0 0 20px;padding-bottom:11px;border-bottom:1px solid #4a3410}
    .screens-hd .st{font-weight:800;font-size:16px;letter-spacing:.3px;color:#ffe08a}
    .screens-hd .st .em{margin-right:7px}
    .screens-hd .sc-count{font-family:var(--mono);font-size:12px;color:var(--mut)}
    .screens-hd .sc-note{flex:1;min-width:180px;text-align:right;font-size:11.5px;color:var(--mut)}
    .screens-hd .sc-count b.on{color:var(--ok)}
    .scards{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:20px}
    .scard{border-radius:0;border:2px solid #8b5a14;background:#1b130a;box-shadow:3px 3px 0 #000;
      padding:18px;display:flex;flex-direction:column;gap:14px}
    .scard.off{opacity:.62}
    .scard-hd{display:flex;align-items:center;gap:11px}
    .scard-hd .plat{font-size:26px;line-height:1;flex:0 0 auto}
    .scard-hd .who{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
    .scard-hd .who .name{font-weight:700;font-size:15px;font-family:var(--mono);color:#ffe08a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .scard-hd .who .loc{font-size:11.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .scard-hd .sdot{width:10px;height:10px;border-radius:50%;background:var(--bad);flex:0 0 auto}
    .scard-hd .sdot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
    .scard-hd .sdot.on.stale{background:var(--warn);box-shadow:0 0 8px var(--warn)}
    .scard-hd .sage{font-family:var(--mono);font-size:11px;color:var(--mut);flex:0 0 auto}
    .scard .now{font-size:12.5px;color:#ffe08a;background:#120c04;border:1px solid #4a3410;border-radius:0;padding:9px 11px;line-height:1.4;min-height:2.7em;display:flex;align-items:center;gap:8px}
    .scard .now .ntype{font-size:15px;flex:0 0 auto}
    .scard .now .ntitle{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .scard .now.empty{color:var(--mut)}
    /* mando embebido: D-pad grande + fila de acciones */
    .scmd{display:flex;flex-direction:column;gap:9px}
    .scmd .dpad{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
    .scmd .row2{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
    .scmd button.mb{border-radius:0;border:1px solid #8b5a14;background:#2a1a08;color:#ffdd66;box-shadow:1px 1px 0 #000;
      padding:13px 4px;font-size:20px;line-height:1;cursor:pointer;transition:transform .07s,background .12s,border-color .12s;
      display:flex;align-items:center;justify-content:center}
    .scmd button.mb:hover{border-color:#f0c040;background:#3a2410;color:#fff}
    .scmd button.mb:active{transform:scale(.92)}
    .scmd button.mb.mid{color:#7ad0ff}
    .scmd button.mb.flash{background:linear-gradient(160deg,rgba(91,214,192,.32),rgba(122,162,255,.16));
      border-color:var(--acc);box-shadow:0 0 0 1px var(--acc),0 0 16px -4px var(--acc)}
    .scmd button.mb.flash.err{background:rgba(255,107,107,.22);border-color:var(--bad);box-shadow:0 0 0 1px var(--bad)}
    .scard .slast{font-family:var(--mono);font-size:11px;color:var(--mut);min-height:1.3em;text-align:center}
    .scard .slast b{color:var(--acc)}
    .scard .slast .tx{color:var(--warn);font-weight:800}                                          /* 1 tick: enviado */
    .scard .slast .rx{color:var(--ok);font-weight:800;text-shadow:0 0 8px rgba(91,214,192,.5)}    /* 2 ticks: recibido */
    .scard .slast .warn{color:var(--bad);font-weight:800}                                          /* enviado sin confirmar */
    .scards .sc-empty{grid-column:1/-1;color:var(--mut);font-size:13.5px;text-align:center;padding:34px;border:2px dashed #8b5a14}

    @media(max-width:560px){
      header{padding:13px 15px}
      .stage{padding:18px 13px 50px}
      .scards{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <header>
    <h1>📺 Players<span class="tag"> /admira.tv</span></h1>
    <span class="sub">Equipos emitiendo admira.tv · control remoto</span>
    <span class="spacer"></span>
    <span class="pill" id="scCount">—</span>
  </header>

  <main class="stage">
    <section class="screens-sec" id="screensSection">
      <div class="screens-hd">
        <span class="st"><span class="em">🕹️</span>Pantallas en emisión</span>
        <span class="sc-note">plano de contenido · mando en vivo (M8) · doble tick · refresco 10 s</span>
      </div>
      <div class="scards" id="screensCards">
        <div class="sc-empty">Cargando pantallas vivas…</div>
      </div>
    </section>
  </main>

<script>
/* ══════════════════════════════════════════════════════════════════════════
   PANTALLAS · PLAYERS — plano de CONTENIDO (canal.html emitiendo).
   Página propia de admira.tv (mudanza desde /control). Fuentes en producción:
     · GET  api.admira.store/signage/screens        → lista de pantallas vivas
     · GET  api.admira.store/signage/now?screen=X    → qué emite cada una
     · POST omnipublicity-api…/control/cmd {screen,cmd} → cola de mando (M8)
     · GET  omnipublicity-api…/control/seen?screen=X → acuse (2º tick)
   Self-contained (IIFE, helpers locales).
   ══════════════════════════════════════════════════════════════════════════ */
(function(){
  const SCREENS_API='https://api.admira.store/signage/screens';
  const NOW_API='https://api.admira.store/signage/now?screen=';
  const CMD_API='https://omnipublicity-api.csilvasantin.workers.dev/control/cmd';
  const SEEN_API='https://omnipublicity-api.csilvasantin.workers.dev/control/seen?screen=';
  const REFRESH_MS=10000, NOW_MS=10000, ONLINE_MAX_AGE=90; // s → verde
  const box=document.getElementById('screensCards');
  const countEl=document.getElementById('scCount');
  if(!box) return;
  const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const nowTimers={}; // screen → interval id de /signage/now

  // Icono de plataforma a partir del user_agent
  function platIcon(ua){
    ua=String(ua||'');
    if(/AdmiraIOSPlayer|iPad|iPhone|iOS/i.test(ua)) return '📱';
    if(/Android/i.test(ua)) return '🤖';
    if(/Electron|AdmiraNext.*Player/i.test(ua)) return '🖥️';
    if(/Macintosh|Mac OS X/i.test(ua)) return '🍎';
    if(/Windows|Win64|Win32/i.test(ua)) return '🪟';
    if(/Linux/i.test(ua)) return '🐧';
    return '📺';
  }
  function ageTxt(s){ if(s==null) return ''; s=Math.round(s); if(s<90) return 'ahora'; if(s<3600) return Math.round(s/60)+'m'; return Math.round(s/3600)+'h'; }

  // Botones del mando (mismo contrato que adcelerate/mando)
  const DPAD=[
    {cmd:'first',ico:'⏮',t:'Primera'},
    {cmd:'prev', ico:'⏪',t:'Anterior'},
    {cmd:'toggle-pause',ico:'⏯',t:'Pausa/Play',mid:1},
    {cmd:'next', ico:'⏩',t:'Siguiente'},
    {cmd:'last', ico:'⏭',t:'Última'},
  ];
  const ROW2=[
    {cmd:'toggle-mute',ico:'🔇',t:'Silencio'},
    {cmd:'vol-down',ico:'🔉',t:'Volumen −'},
    {cmd:'vol-up', ico:'🔊',t:'Volumen +'},
    {cmd:'ontop-toggle',ico:'📌',t:'Siempre encima'},
    {cmd:'hud',    ico:'🅗',t:'HUD / diagnóstico'},
  ];

  // Espera el ACUSE de la pantalla: poll /control/seen hasta ver el id (2º tick).
  function waitReceipt(screen,cmd,id,t0,lastEl){
    const timeout=8000, every=600, deadline=Date.now()+timeout;
    const tick=async()=>{
      let seen=[];
      try{ const r=await fetch(SEEN_API+encodeURIComponent(screen),{cache:'no-store'});
        const j=await r.json().catch(()=>null); seen=(j&&Array.isArray(j.seen))?j.seen:[];
      }catch(_){ /* red intermitente: seguimos hasta el deadline */ }
      if(seen.some(s=>s&&s.id===id)){
        if(lastEl) lastEl.innerHTML='<span class="rx">✓✓ recibido</span> · <b>'+esc(cmd)+'</b> · '+(Date.now()-t0)+'ms';
        return;
      }
      if(Date.now()>=deadline){
        if(lastEl) lastEl.innerHTML='<span class="warn">⚠ enviado · sin confirmación</span> — ¿pantalla offline?';
        return;
      }
      setTimeout(tick,every);
    };
    setTimeout(tick,every);
  }

  async function sendCmd(screen,cmd,btn,lastEl){
    if(btn){ btn.classList.remove('err'); btn.classList.add('flash'); setTimeout(()=>btn.classList.remove('flash'),260); }
    const t0=Date.now();
    if(lastEl) lastEl.innerHTML='→ enviando <b>'+esc(cmd)+'</b>…';
    try{
      const r=await fetch(CMD_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({screen,cmd})});
      const j=await r.json().catch(()=>null);
      if(r.ok&&j&&j.ok){
        if(lastEl) lastEl.innerHTML='<span class="tx">✓ enviado</span> · <b>'+esc(cmd)+'</b> · esperando pantalla…';
        waitReceipt(screen,cmd,j.id,t0,lastEl);   // 2º tick
      }
      else { if(btn){ btn.classList.add('flash','err'); } if(lastEl) lastEl.textContent='✗ '+((j&&j.error)||('HTTP '+r.status)); }
    }catch(_){ if(btn){ btn.classList.add('flash','err'); } if(lastEl) lastEl.textContent='✗ sin red'; }  // sólo error REAL: el POST falló
  }

  function padHTML(list){ return list.map(b=>'<button class="mb'+(b.mid?' mid':'')+'" data-cmd="'+b.cmd+'" title="'+esc(b.t)+'">'+b.ico+'</button>').join(''); }

  function renderNow(el,item){
    if(!item){ el.className='now empty'; el.innerHTML='<span class="ntype">▪</span><span class="ntitle">— sin datos de emisión —</span>'; return; }
    el.className='now';
    const ic=item.type==='video'?'🎬':(item.type==='image'?'🖼️':(item.type==='web'?'🌐':'▶'));
    const dur=item.dur?(' · '+Math.round(item.dur)+'s'):'';
    el.innerHTML='<span class="ntype">'+ic+'</span><span class="ntitle" title="'+esc(item.title||item.id||'')+'">'+esc(item.title||item.id||'(sin título)')+dur+'</span>';
  }

  async function pollNow(screen,el){
    try{ const r=await fetch(NOW_API+encodeURIComponent(screen),{cache:'no-store'});
      const d=await r.json().catch(()=>null); renderNow(el, d&&d.item?d.item:null);
    }catch(_){ /* deja el último valor */ }
  }

  function cardHTML(s){
    // Online = veredicto del backend (ya pondera su propio umbral por plataforma;
    // los players iOS laten cada ~2 min, así que age_seconds solo colorea "reciente/rezagado").
    const stale=s.online && s.age_seconds!=null && s.age_seconds>ONLINE_MAX_AGE;
    const name=esc(s.screen);
    const loc=esc(s.locName||s.loc||s.role||'—');
    return ''+
      '<div class="scard'+(s.online?'':' off')+'" data-screen="'+name+'">'+
        '<div class="scard-hd">'+
          '<span class="plat" title="'+esc(s.user_agent||'')+'">'+platIcon(s.user_agent)+'</span>'+
          '<span class="who"><span class="name">'+name+'</span><span class="loc">'+loc+'</span></span>'+
          '<span class="sdot'+(s.online?' on':'')+(stale?' stale':'')+'" title="'+(s.online?('online'+(stale?' · latido rezagado':'')):'offline')+'"></span>'+
          '<span class="sage">'+esc(ageTxt(s.age_seconds))+'</span>'+
        '</div>'+
        '<div class="now empty" data-now><span class="ntype">…</span><span class="ntitle">cargando emisión…</span></div>'+
        '<div class="scmd">'+
          '<div class="dpad">'+padHTML(DPAD)+'</div>'+
          '<div class="row2">'+padHTML(ROW2)+'</div>'+
        '</div>'+
        '<div class="slast" data-last>&nbsp;</div>'+
      '</div>';
  }

  function wireCard(card){
    const screen=card.getAttribute('data-screen');
    const lastEl=card.querySelector('[data-last]');
    card.querySelectorAll('button.mb').forEach(b=>{
      b.addEventListener('click',()=>sendCmd(screen,b.getAttribute('data-cmd'),b,lastEl));
    });
    const nowEl=card.querySelector('[data-now]');
    pollNow(screen,nowEl);
    if(nowTimers[screen]) clearInterval(nowTimers[screen]);
    nowTimers[screen]=setInterval(()=>pollNow(screen,nowEl),NOW_MS);
  }

  async function refresh(){
    let d=null;
    try{ const r=await fetch(SCREENS_API,{cache:'no-store'}); d=await r.json(); }
    catch(_){ d=null; }
    if(!d || !Array.isArray(d.screens)){
      // degradación honesta: no inventamos pantallas
      box.innerHTML='<div class="sc-empty">⚠ Sin datos de <b>/signage/screens</b> — reintentando…</div>';
      if(countEl) countEl.textContent='sin conexión';
      return;
    }
    const arr=d.screens.slice().sort((a,b)=>(b.online-a.online)||((b.last_seen||0)-(a.last_seen||0)));
    // limpia timers de pantallas que ya no están
    const alive=new Set(arr.map(s=>s.screen));
    Object.keys(nowTimers).forEach(sc=>{ if(!alive.has(sc)){ clearInterval(nowTimers[sc]); delete nowTimers[sc]; } });
    if(countEl){ const onc=arr.filter(s=>s.online).length; countEl.innerHTML='<b class="on">'+onc+'</b> online / '+arr.length; }
    if(!arr.length){ box.innerHTML='<div class="sc-empty">No hay pantallas vivas ahora mismo.</div>'; return; }
    box.innerHTML=arr.map(cardHTML).join('');
    box.querySelectorAll('.scard').forEach(wireCard);
  }

  refresh();
  setInterval(refresh, REFRESH_MS);
})();
</script>
</body>
</html>
