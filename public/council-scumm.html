<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdmiraNext Council — SCUMM Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a14;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header (from dashboard) ── */
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.5rem 0; width: 100%; }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
            background: linear-gradient(135deg, #e74c3c, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .version {
            text-align: center;
            color: #444;
            font-size: 0.7rem;
            margin-bottom: 0.3rem;
        }
        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .subtitle .live { color: #44bb44; }

        /* Generation toggle */
        .gen-toggle {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 1rem;
        }
        .gen-btn {
            padding: 0.7rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            border: 2px solid #333;
            background: #1a1a2e;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .gen-btn:first-child { border-radius: 10px 0 0 10px; }
        .gen-btn:last-child { border-radius: 0 10px 10px 0; }
        .gen-btn:hover { background: #222; color: #aaa; }
        .gen-btn.active-leyendas {
            background: linear-gradient(135deg, #b8860b, #daa520);
            color: #fff;
            border-color: #daa520;
            box-shadow: 0 0 15px rgba(218, 165, 32, 0.3);
        }
        .gen-btn.active-coetaneos {
            background: linear-gradient(135deg, #2980b9, #3498db);
            color: #fff;
            border-color: #3498db;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.3);
        }

        /* Summary bar */
        .summary {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 0.5rem 0 1rem;
            flex-wrap: wrap;
        }
        .summary-item {
            text-align: center;
            padding: 0.5rem 1rem;
            background: #1a1a2e;
            border-radius: 10px;
        }
        .summary-number { font-size: 1.5rem; font-weight: 800; }
        .summary-number.green { color: #44bb44; }
        .summary-number.red { color: #e74c3c; }
        .summary-number.blue { color: #3498db; }
        .summary-label { font-size: 0.65rem; color: #888; margin-top: 0.2rem; }

        /* Council image */
        .council-image {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            border-radius: 12px 12px 0 0;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .council-image img {
            width: 100%;
            display: block;
            transition: opacity 0.3s ease;
        }

        /* Nameplate overlays */
        .nameplates {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
        }
        .np {
            position: absolute;
            padding: 2px 6px;
            font-size: 0.55rem;
            font-weight: 800;
            text-align: center;
            border-radius: 3px;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
            transform: translateX(-50%);
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.3);
            text-shadow: 0 1px 1px rgba(0,0,0,0.3);
        }
        .np.gold {
            background: linear-gradient(180deg, #daa520, #b8860b);
            color: #fff;
            box-shadow: 0 0 6px rgba(218,165,32,0.5);
        }
        .np.gray {
            background: linear-gradient(180deg, #555, #3a3a3a);
            color: #888;
            box-shadow: none;
        }
        .np .np-role {
            font-size: 0.45rem;
            opacity: 0.8;
            display: block;
        }
        .np.speaking::after {
            content: '';
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #44ff44;
            box-shadow: 0 0 6px #44ff44;
            margin-left: 4px;
            animation: blink-led 0.8s infinite;
            vertical-align: middle;
        }
        @keyframes blink-led {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ══════════════════════════════════════════════
           SCUMM BAR — verb grid + action line + inventory
           ══════════════════════════════════════════════ */
        .scumm-bar {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            background: #0d0818;
            border: 2px solid #1a1a2e;
            border-top: 1px solid #2a1a3a;
            border-radius: 0 0 12px 12px;
            padding: 0;
            font-family: 'Press Start 2P', monospace;
        }

        .action-line {
            text-align: center;
            font-size: 9px;
            color: #daa520;
            padding: 8px 12px;
            min-height: 28px;
            border-bottom: 1px solid #1a1a2e;
            text-shadow: 0 0 8px rgba(218,165,32,0.4);
            letter-spacing: 0.5px;
        }

        .scumm-bottom {
            display: flex;
        }

        .verb-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 8px;
            flex: 1;
        }
        .verb-btn {
            background: transparent;
            border: none;
            color: #b8860b;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 6px 4px;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 3px;
        }
        .verb-btn:hover {
            color: #daa520;
            text-shadow: 0 0 8px rgba(218,165,32,0.5);
            background: rgba(218,165,32,0.08);
        }
        .verb-btn.active {
            color: #fff;
            text-shadow: 0 0 12px rgba(218,165,32,0.8);
            background: rgba(218,165,32,0.15);
        }
        .verb-btn.verb-primary { color: #e74c3c; }
        .verb-btn.verb-primary:hover {
            color: #ff6b6b;
            text-shadow: 0 0 8px rgba(231,76,60,0.5);
            background: rgba(231,76,60,0.08);
        }
        .verb-btn.verb-primary.active {
            color: #fff;
            text-shadow: 0 0 12px rgba(231,76,60,0.8);
            background: rgba(231,76,60,0.15);
        }

        .inventory {
            width: 240px;
            border-left: 1px solid #1a1a2e;
            padding: 6px 8px;
            display: flex;
            flex-direction: column;
        }
        .inventory-title {
            font-size: 6px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            text-align: center;
        }
        .inventory-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            overflow-y: auto;
            max-height: 80px;
        }
        .inv-item {
            font-size: 7px;
            color: #3498db;
            padding: 3px 6px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .inv-item:hover {
            background: rgba(52,152,219,0.1);
            color: #5dade2;
        }
        .inv-item.selected {
            background: rgba(52,152,219,0.15);
            color: #fff;
        }

        /* ── Speech bubble ── */
        .speech-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 10;
        }
        .speech-bubble {
            position: absolute;
            background: rgba(10, 10, 20, 0.92);
            border: 2px solid #daa520;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.75rem;
            color: #e0e0e0;
            max-width: 300px;
            line-height: 1.5;
            display: none;
            box-shadow: 0 0 15px rgba(218,165,32,0.2);
        }
        .speech-bubble .speaker {
            font-weight: 700;
            color: #daa520;
            margin-bottom: 4px;
            font-size: 0.65rem;
            text-transform: uppercase;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 20px;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #daa520;
        }

        .round-indicator {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: #daa520;
            background: rgba(10,10,20,0.85);
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #333;
            z-index: 5;
        }

        /* ── Output panel ── */
        .output-panel {
            width: 100%;
            max-width: 1000px;
            margin: 12px auto 1.5rem;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 1rem 1.2rem;
            display: none;
            max-height: 400px;
            overflow-y: auto;
        }
        .output-panel.visible { display: block; }
        .output-panel h3 {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #daa520;
            margin-bottom: 12px;
        }
        .output-entry {
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }
        .output-entry:last-child { border-bottom: none; }
        .output-speaker {
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }
        .output-speaker.racional { color: #e74c3c; }
        .output-speaker.creativo { color: #3498db; }
        .output-text {
            font-size: 0.85rem;
            color: #bbb;
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            color: #333;
            font-size: 0.7rem;
            padding: 1rem;
            margin-top: auto;
        }

        .crt-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                to bottom, transparent 0px, transparent 3px,
                rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
            );
        }

        @media (max-width: 768px) {
            .scumm-bottom { flex-direction: column; }
            .inventory { width: 100%; border-left: none; border-top: 1px solid #1a1a2e; }
            .gen-btn { padding: 0.5rem 1.2rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>

    <div class="container">
        <h1>AdmiraNext Council Dashboard</h1>
        <div class="version">v26.11.04.2</div>
        <div class="subtitle">
            Estado en tiempo real del Consejo de Dirección · <span class="live" id="live-dot">● LIVE</span> · <span id="last-check">hace 0s</span>
        </div>

        <div class="gen-toggle">
            <button class="gen-btn active-leyendas" id="btn-leyendas" onclick="setGen('leyendas')">⭐ Leyendas</button>
            <button class="gen-btn" id="btn-coetaneos" onclick="setGen('coetaneos')">🚀 Coetáneos</button>
        </div>

        <div class="summary" id="summary"></div>
    </div>

    <div style="max-width:1000px;margin:0 auto;width:100%;padding:0 1.5rem;">
        <div class="council-image" id="council-image">
            <img id="council-img" src="../assets/council-leyendas.jpg" alt="Consejo AdmiraNext">
            <div class="nameplates" id="nameplates"></div>
            <div class="speech-overlay" id="speech-overlay">
                <div class="speech-bubble" id="speech-bubble">
                    <div class="speaker"></div>
                    <div class="speech-text"></div>
                </div>
            </div>
            <div class="round-indicator" id="round-indicator">Ronda: --</div>
        </div>

        <div class="scumm-bar">
            <div class="action-line" id="action-line">Bienvenido al Consejo AdmiraNext</div>
            <div class="scumm-bottom">
                <div class="verb-grid">
                    <button class="verb-btn verb-primary" data-verb="presentar" onclick="selectVerb(this)">Presentar</button>
                    <button class="verb-btn verb-primary" data-verb="debatir" onclick="selectVerb(this)">Debatir</button>
                    <button class="verb-btn verb-primary" data-verb="sintetizar" onclick="selectVerb(this)">Sintetizar</button>
                    <button class="verb-btn" data-verb="mirar" onclick="selectVerb(this)">Mirar</button>
                    <button class="verb-btn" data-verb="hablar" onclick="selectVerb(this)">Hablar con</button>
                    <button class="verb-btn" data-verb="leer" onclick="selectVerb(this)">Leer</button>
                    <button class="verb-btn" data-verb="votar" onclick="selectVerb(this)">Votar</button>
                    <button class="verb-btn" data-verb="comparar" onclick="selectVerb(this)">Comparar</button>
                    <button class="verb-btn" data-verb="salir" onclick="selectVerb(this)">Salir</button>
                </div>
                <div class="inventory">
                    <div class="inventory-title">Proyectos</div>
                    <div class="inventory-list" id="inventory-list">
                        <div class="inv-item" onclick="selectProject(this)">Brief de ejemplo</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="output-panel" id="output-panel">
        <h3 id="output-title">Resultados del debate</h3>
        <div id="output-content"></div>
    </div>

    <div class="footer">
        AdmiraNext Council SCUMM · Última comprobación: <span id="footer-check">—</span>
    </div>

    <script>
    const CONTROL_API = "http://localhost:3030/api/machines";
    const COUNCIL_API = null;

    const COUNCIL = [
        { name: "CEO", role: "Chief Executive Officer",   persona: "Steve Jobs",      side: "racional", gen: "leyendas", icon: "🏛️", machineId: "admira-macbookair16" },
        { name: "CTO", role: "Chief Technology Officer",  persona: "Steve Wozniak",   side: "racional", gen: "leyendas", icon: "⚙️", machineId: "admira-macbookpronegro14" },
        { name: "COO", role: "Chief Operations Officer",  persona: "Tim Cook",        side: "racional", gen: "leyendas", icon: "📋", machineId: null },
        { name: "CFO", role: "Chief Financial Officer",   persona: "Warren Buffett",  side: "racional", gen: "leyendas", icon: "💰", machineId: "admira-macmini" },
        { name: "CCO", role: "Chief Creative Officer",    persona: "Walt Disney",     side: "creativo", gen: "leyendas", icon: "💡", machineId: null },
        { name: "CDO", role: "Chief Design Officer",      persona: "Dieter Rams",     side: "creativo", gen: "leyendas", icon: "🎨", machineId: "admira-macbookairblanco" },
        { name: "CXO", role: "Chief Experience Officer",  persona: "Howard Schultz",  side: "creativo", gen: "leyendas", icon: "🧭", machineId: null },
        { name: "CSO", role: "Chief Storytelling Officer", persona: "George Lucas",    side: "creativo", gen: "leyendas", icon: "📖", machineId: null },
        { name: "CEO", role: "Chief Executive Officer",   persona: "Elon Musk",       side: "racional", gen: "coetaneos", icon: "🏛️", machineId: "admira-macbookair16" },
        { name: "CTO", role: "Chief Technology Officer",  persona: "Jensen Huang",    side: "racional", gen: "coetaneos", icon: "⚙️", machineId: "admira-macbookpronegro14" },
        { name: "COO", role: "Chief Operations Officer",  persona: "Gwynne Shotwell", side: "racional", gen: "coetaneos", icon: "📋", machineId: null },
        { name: "CFO", role: "Chief Financial Officer",   persona: "Ruth Porat",      side: "racional", gen: "coetaneos", icon: "💰", machineId: "admira-macmini" },
        { name: "CCO", role: "Chief Creative Officer",    persona: "John Lasseter",   side: "creativo", gen: "coetaneos", icon: "💡", machineId: null },
        { name: "CDO", role: "Chief Design Officer",      persona: "Jony Ive",        side: "creativo", gen: "coetaneos", icon: "🎨", machineId: "admira-macbookairblanco" },
        { name: "CXO", role: "Chief Experience Officer",  persona: "Carlos Ratti",    side: "creativo", gen: "coetaneos", icon: "🧭", machineId: null },
        { name: "CSO", role: "Chief Storytelling Officer", persona: "Ryan Reynolds",   side: "creativo", gen: "coetaneos", icon: "📖", machineId: null },
    ];

    const NAMEPLATE_POS = {
        leyendas: [
            { role: "CEO", persona: "Steve Jobs",      x: 17, y: 88, machineId: "admira-macbookair16" },
            { role: "CTO", persona: "Steve Wozniak",   x: 22, y: 60, machineId: "admira-macbookpronegro14" },
            { role: "COO", persona: "Tim Cook",        x: 37, y: 52, machineId: null },
            { role: "CFO", persona: "Warren Buffett",  x: 37, y: 38, machineId: "admira-macmini" },
            { role: "CCO", persona: "Walt Disney",     x: 53, y: 52, machineId: null },
            { role: "CDO", persona: "Dieter Rams",     x: 63, y: 55, machineId: "admira-macbookairblanco" },
            { role: "CXO", persona: "Howard Schultz",  x: 72, y: 60, machineId: null },
            { role: "CSO", persona: "George Lucas",    x: 83, y: 88, machineId: null },
        ],
        coetaneos: [
            { role: "CEO", persona: "Elon Musk",       x: 17, y: 88, machineId: "admira-macbookair16" },
            { role: "CTO", persona: "Jensen Huang",    x: 24, y: 62, machineId: "admira-macbookpronegro14" },
            { role: "COO", persona: "Gwynne Shotwell", x: 35, y: 52, machineId: null },
            { role: "CFO", persona: "Ruth Porat",      x: 42, y: 52, machineId: "admira-macmini" },
            { role: "CCO", persona: "John Lasseter",   x: 53, y: 52, machineId: null },
            { role: "CDO", persona: "Jony Ive",        x: 63, y: 58, machineId: "admira-macbookairblanco" },
            { role: "CXO", persona: "Carlos Ratti",    x: 75, y: 62, machineId: null },
            { role: "CSO", persona: "Ryan Reynolds",   x: 85, y: 88, machineId: null },
        ],
    };

    let machineStatus = {};
    let apiOk = false;
    let currentGen = "leyendas";
    let currentVerb = null;
    let currentProject = null;
    let debateRunning = false;

    function setGen(gen) {
        currentGen = gen;
        document.getElementById("btn-leyendas").className = "gen-btn" + (gen === "leyendas" ? " active-leyendas" : "");
        document.getElementById("btn-coetaneos").className = "gen-btn" + (gen === "coetaneos" ? " active-coetaneos" : "");
        const img = document.getElementById("council-img");
        img.style.opacity = "0";
        setTimeout(() => {
            img.src = gen === "leyendas" ? "../assets/council-leyendas.jpg" : "../assets/council-coetaneos.jpg";
            img.style.opacity = "1";
        }, 300);
        render();
    }

    async function fetchMachines() {
        try {
            const res = await fetch(CONTROL_API);
            const data = await res.json();
            machineStatus = {};
            (data.machines || []).forEach(m => {
                const isOnline = m.status === "online" || m.status === "idle" || m.status === "busy";
                machineStatus[m.id] = { status: m.status, name: m.name, online: isOnline };
            });
            apiOk = true;
        } catch (e) {
            apiOk = false;
        }
    }

    function render() {
        const filtered = COUNCIL.filter(m => m.gen === currentGen);
        const liveEl = document.getElementById("live-dot");
        liveEl.textContent = apiOk ? "● LIVE" : "● OFFLINE";
        liveEl.style.color = apiOk ? "#44bb44" : "#e74c3c";

        let onlineCount = 0, offlineCount = 0;
        let totalMachinesOnline = Object.values(machineStatus).filter(m => m.online).length;

        filtered.forEach(m => {
            const machine = m.machineId ? machineStatus[m.machineId] : null;
            if (machine && machine.online) onlineCount++; else offlineCount++;
        });

        document.getElementById("summary").innerHTML = `
            <div class="summary-item">
                <div class="summary-number green">${onlineCount}</div>
                <div class="summary-label">Consejeros activos</div>
            </div>
            <div class="summary-item">
                <div class="summary-number red">${offlineCount}</div>
                <div class="summary-label">Sin conexión</div>
            </div>
            <div class="summary-item">
                <div class="summary-number blue">${totalMachinesOnline}</div>
                <div class="summary-label">Máquinas online</div>
            </div>
        `;

        const npEl = document.getElementById("nameplates");
        const plates = NAMEPLATE_POS[currentGen] || [];
        npEl.innerHTML = plates.map(p => {
            const machine = p.machineId ? machineStatus[p.machineId] : null;
            const isOnline = machine ? machine.online : false;
            const cls = isOnline ? "gold" : "gray";
            return `<div class="np ${cls}" data-persona="${p.persona}" style="left:${p.x}%;top:${p.y}%">
                ${p.persona}<span class="np-role">${p.role}</span>
            </div>`;
        }).join("");

        const now = new Date().toLocaleString("es-ES");
        document.getElementById("footer-check").textContent = now;
    }

    /* ═══ SCUMM verbs ═══ */
    function selectVerb(btn) {
        document.querySelectorAll('.verb-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentVerb = btn.dataset.verb;
        updateActionLine();

        if (['presentar','debatir','sintetizar'].includes(currentVerb)) {
            if (!currentProject) { setActionLine("Selecciona un proyecto del inventario"); return; }
            executeCouncilVerb(currentVerb);
        }
        if (currentVerb === 'mirar') setActionLine("Mirar... haz clic en un consejero");
        if (currentVerb === 'hablar') setActionLine("Hablar con... selecciona un consejero");
        if (currentVerb === 'leer') setActionLine("Leer el último informe del consejo");
        if (currentVerb === 'votar') setActionLine("Votar sobre la propuesta actual");
        if (currentVerb === 'comparar') setActionLine("Comparar Leyendas vs Coetáneos");
        if (currentVerb === 'salir') {
            setActionLine("Volviendo al dashboard...");
            setTimeout(() => { window.location.href = '../'; }, 1000);
        }
    }

    function updateActionLine() {
        const names = { presentar:"Presentar", debatir:"Debatir", sintetizar:"Sintetizar", mirar:"Mirar", hablar:"Hablar con", leer:"Leer", votar:"Votar", comparar:"Comparar", salir:"Salir" };
        const v = names[currentVerb] || "";
        const p = currentProject ? ` "${currentProject}"` : "";
        if (v) document.getElementById("action-line").textContent = v + p;
    }

    function setActionLine(text) { document.getElementById("action-line").textContent = text; }

    function selectProject(el) {
        document.querySelectorAll('.inv-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        currentProject = el.textContent.trim();
        updateActionLine();
    }

    /* ═══ Council execution ═══ */
    async function executeCouncilVerb(verb) {
        if (debateRunning) { setActionLine("Debate en curso... espera"); return; }
        if (COUNCIL_API) { runRealCouncil(verb); } else { runSimulation(verb); }
    }

    async function runSimulation(verb) {
        debateRunning = true;
        const members = COUNCIL.filter(m => m.gen === currentGen);
        const roundName = { presentar:"Propuestas", debatir:"Debate", sintetizar:"Síntesis" }[verb];

        document.getElementById("round-indicator").textContent = `Ronda: ${roundName}`;
        setActionLine(`${roundName} en curso...`);

        const panel = document.getElementById("output-panel");
        const content = document.getElementById("output-content");
        document.getElementById("output-title").textContent = `Ronda: ${roundName}`;
        panel.classList.add("visible");
        content.innerHTML = "";

        for (let i = 0; i < members.length; i++) {
            const m = members[i];
            showSpeechBubble(m.persona, m.name, `[${m.persona} está ${verb === 'presentar' ? 'presentando' : verb === 'debatir' ? 'debatiendo' : 'sintetizando'}...]`);
            highlightNameplate(m.persona);

            const entry = document.createElement("div");
            entry.className = "output-entry";
            entry.innerHTML = `
                <div class="output-speaker ${m.side}">${m.icon} ${m.name} — ${m.persona}</div>
                <div class="output-text">[Simulación] ${m.persona} ${verb === 'presentar' ? 'presenta su visión' : verb === 'debatir' ? 'debate los puntos' : 'ofrece su síntesis'}.</div>
            `;
            content.appendChild(entry);
            panel.scrollTop = panel.scrollHeight;

            await sleep(800);
            clearNameplateHighlight();
        }

        hideSpeechBubble();
        debateRunning = false;
        document.getElementById("round-indicator").textContent = `Ronda: ${roundName} ✓`;
        setActionLine(`${roundName} completada — ${members.length} consejeros`);
    }

    function showSpeechBubble(persona, role, text) {
        const b = document.getElementById("speech-bubble");
        b.querySelector(".speaker").textContent = `${role} — ${persona}`;
        b.querySelector(".speech-text").textContent = text;
        b.style.display = "block";
        const np = document.querySelector(`.np[data-persona="${persona}"]`);
        if (np) {
            b.style.left = Math.max(5, Math.min(parseFloat(np.style.left) - 10, 60)) + "%";
            b.style.top = Math.max(5, parseFloat(np.style.top) - 20) + "%";
        } else { b.style.left = "30%"; b.style.top = "10%"; }
    }

    function hideSpeechBubble() { document.getElementById("speech-bubble").style.display = "none"; }

    function highlightNameplate(persona) {
        document.querySelectorAll('.np').forEach(n => n.classList.remove('speaking'));
        const np = document.querySelector(`.np[data-persona="${persona}"]`);
        if (np) np.classList.add('speaking');
    }

    function clearNameplateHighlight() { document.querySelectorAll('.np').forEach(n => n.classList.remove('speaking')); }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function runRealCouncil(verb) {
        debateRunning = true;
        setActionLine("Conectando con el motor del consejo...");
        try {
            const res = await fetch(`${COUNCIL_API}/${verb}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ brief: currentProject, generation: currentGen })
            });
            const data = await res.json();
            setActionLine(`${verb} completado`);
        } catch (e) {
            setActionLine("Error: no se pudo conectar con el motor");
        }
        debateRunning = false;
    }

    /* ═══ Init ═══ */
    async function refresh() { await fetchMachines(); render(); }
    refresh();
    setInterval(refresh, 15000);

    let lastRefresh = Date.now();
    setInterval(() => {
        document.getElementById("last-check").textContent = `hace ${Math.floor((Date.now() - lastRefresh) / 1000)}s`;
    }, 1000);
    </script>
</body>
</html>
