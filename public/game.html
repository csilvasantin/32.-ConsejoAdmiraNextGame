<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdmiraNext — Aventura Gráfica</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050005;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
    }
    #game-wrapper {
      position: relative; width: 640px;
      box-shadow: 0 0 80px #33003366, 0 0 200px #22001122;
    }
    #crt-lines {
      position: absolute; inset: 0; pointer-events: none; z-index: 100;
      background: repeating-linear-gradient(
        to bottom, transparent 0px, transparent 3px,
        rgba(0,0,0,0.14) 3px, rgba(0,0,0,0.14) 4px
      );
    }
    #crt-vign {
      position: absolute; inset: 0; pointer-events: none; z-index: 101;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
    }
    #top-bar {
      background: #0a0010; border: 2px solid #330033; border-bottom: none;
      padding: 5px 10px; display: flex; justify-content: space-between; align-items: center;
    }
    #top-bar .logo { color: #ff55cc; font-size: 6px; letter-spacing: 1px; }
    #top-bar nav a { color: #441144; font-size: 5px; text-decoration: none; margin-left: 10px; }
    #top-bar nav a:hover { color: #cc88ff; }
    #game-canvas {
      display: block; width: 640px; height: 400px;
      border-left: 2px solid #330033; border-right: 2px solid #330033;
      image-rendering: pixelated; image-rendering: crisp-edges;
      cursor: crosshair;
    }
    #dialog-layer {
      position: absolute; left: 2px; right: 2px;
      top: 28px; bottom: 115px;
      display: none; align-items: flex-end; justify-content: center;
      z-index: 50; pointer-events: none;
    }
    #dialog-box {
      background: #000090; border: 3px solid #5555ff;
      padding: 10px 14px; max-width: 560px; width: 95%;
      pointer-events: all; position: relative;
      box-shadow: inset 0 0 20px #0000ff22;
    }
    #dialog-title { color: #ffff44; font-size: 7px; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid #2222aa; }
    #dialog-body  { color: #bbbbff; font-size: 6px; line-height: 14px; }
    #dialog-body b    { color: #88aaff; }
    #dialog-body code { color: #00ff99; font-family: 'Press Start 2P', monospace; font-size: 5px; }
    #dialog-close {
      position: absolute; top: 7px; right: 10px;
      background: none; border: none; color: #ff4444;
      font-family: 'Press Start 2P', monospace; font-size: 8px; cursor: pointer;
    }
    #command-area {
      display: none; background: #08000e;
      border: 2px solid #330033; border-top: none; border-bottom: none;
      padding: 5px 10px; align-items: center; gap: 6px;
    }
    #command-label { color: #ff55cc; font-size: 6px; white-space: nowrap; flex-shrink: 0; }
    #command-input {
      flex: 1; background: #080010; border: 1px solid #440055;
      color: #ff88ff; font-family: 'Press Start 2P', monospace;
      font-size: 6px; padding: 5px 8px; outline: none;
    }
    #command-input:focus { border-color: #880099; }
    #command-send {
      background: #220033; border: 1px solid #880099; color: #ff55cc;
      font-family: 'Press Start 2P', monospace; font-size: 6px;
      padding: 5px 8px; cursor: pointer; flex-shrink: 0;
    }
    #command-send:hover { background: #330044; }
    #command-cancel {
      background: none; border: none; color: #550033;
      font-family: 'Press Start 2P', monospace; font-size: 8px; cursor: pointer;
    }
    #footer {
      background: #060008; border: 2px solid #330033; border-top: 1px solid #220022;
      padding: 4px 10px; display: flex; justify-content: space-between; align-items: center;
    }
    #footer a   { color: #221122; font-size: 5px; text-decoration: none; }
    #footer a:hover { color: #886699; }
    #scene-id   { color: #221122; font-size: 5px; }
  </style>
</head>
<body>
<div id="game-wrapper">
  <div id="crt-lines"></div>
  <div id="crt-vign"></div>

  <div id="top-bar">
    <span class="logo">⚡ ADMIRANEXT v0.2 — SCUMM ENGINE</span>
    <nav>
      <a href="/equipo">PANEL</a>
      <a href="/admin">CONSEJO</a>
      <a href="/control">CTRL</a>
    </nav>
  </div>

  <canvas id="game-canvas" width="640" height="400"></canvas>

  <div id="dialog-layer">
    <div id="dialog-box">
      <button id="dialog-close" onclick="closeDialog()">✕</button>
      <div id="dialog-title">INFO</div>
      <div id="dialog-body"></div>
    </div>
  </div>

  <div id="command-area">
    <span id="command-label">&gt;</span>
    <input id="command-input" type="text" placeholder="escribe un comando..." autocomplete="off" spellcheck="false">
    <button id="command-send">ENVIAR</button>
    <button id="command-cancel">✕</button>
  </div>

  <div id="footer">
    <a href="/">← VOLVER</a>
    <span id="scene-id">SALA: OFICINA</span>
    <span style="color:#221122;font-size:5px">ADMIRANEXT</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  ADMIRANEXT — SCUMM ENGINE
//  Canvas 640×400  |  P=2  |  GW=320  GH=200
//  Escena: y 0–143   Verb UI: y 143–200
// ═══════════════════════════════════════════════════════════

const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');
const P = 2, CW = 640, CH = 400, GW = 320, GH = 200;
const SCENE_H = 143;   // línea de separación escena/UI
const FLOOR_Y = 100;   // línea de suelo en la escena

// ── Paletas ─────────────────────────────────────────────────
const STATUS_COLOR = {
  online:'#22bb55', idle:'#2288dd', busy:'#dd7722',
  offline:'#555577', maintenance:'#8844cc',
};
const STATUS_HI = {
  online:'#44ee77', idle:'#44aaff', busy:'#ffaa44',
  offline:'#8888aa', maintenance:'#bb77ff',
};
const STATUS_SH = {
  online:'#115533', idle:'#114499', busy:'#995511',
  offline:'#333355', maintenance:'#442288',
};
const ROLE_COLOR = {
  CEO:'#ff6644', CFO:'#3388ff', COO:'#44cc66',
  CTO:'#aa66ff', CCO:'#ff44aa', CSO:'#33cccc',
  CXO:'#ffcc00', CDO:'#ff8844',
};

// ── Verbs SCUMM (3×3) ───────────────────────────────────────
const VERBS = [
  { id:'dar',     label:'Dar'     },
  { id:'coger',   label:'Coger'   },
  { id:'usar',    label:'Usar'    },
  { id:'abrir',   label:'Abrir'   },
  { id:'mirar',   label:'Mirar'   },
  { id:'empujar', label:'Empujar' },
  { id:'cerrar',  label:'Cerrar'  },
  { id:'hablar',  label:'Hablar'  },
  { id:'tirar',   label:'Tirar'   },
];
// Columnas x y filas y de cada verbo (game coords)
const VERB_COL_X = [5, 77, 152];
const VERB_ROW_Y = [157, 170, 183];

// ── Estado ──────────────────────────────────────────────────
const G = {
  scene:      'oficina',
  verb:       'mirar',
  verbHover:  null,
  selected:   null,
  hover:      null,
  machines:   [],
  consejeros: [],
  cmdTarget:  null,
  tick:       0,
  lastNarr:   'Sala de Control AdmiraNext. El equipo trabaja en silencio.',
  actionText: 'Mirar',
};

// Posiciones personajes (gy = pie en y=100)
const POS_OFICINA = [
  [22,58],[63,55],[104,58],[146,55],
  [188,58],[230,55],[268,58],[292,55],
];
const POS_CONSEJO = [
  [28,58],[70,55],[113,58],[156,55],
  [198,58],[240,55],[275,58],[300,55],
];

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
const px = n => n * P;
function rect(gx,gy,gw,gh,c){ ctx.fillStyle=c; ctx.fillRect(px(gx),px(gy),px(gw),px(gh)); }
function hline(gx,gy,gw,c)  { ctx.fillStyle=c; ctx.fillRect(px(gx),px(gy),px(gw),P); }
function vline(gx,gy,gh,c)  { ctx.fillStyle=c; ctx.fillRect(px(gx),px(gy),P,px(gh)); }
function dot(gx,gy,c)       { ctx.fillStyle=c; ctx.fillRect(px(gx),px(gy),P,P); }

function hexRGB(h){ const s=h.replace('#',''); return[parseInt(s,16)>>16&255,(parseInt(s,16)>>8)&255,parseInt(s,16)&255]; }
function rgbHex(r,g,b){ return '#'+[r,g,b].map(v=>Math.min(255,Math.max(0,v)).toString(16).padStart(2,'0')).join(''); }
function lighten(h,a=30){ const[r,g,b]=hexRGB(h); return rgbHex(r+a,g+a,b+a); }
function darken(h,a=30) { const[r,g,b]=hexRGB(h); return rgbHex(r-a,g-a,b-a); }
function hashStr(s){ return[...String(s)].reduce((a,c)=>((a<<5)-a+c.charCodeAt(0))|0,0)&0x7fffffff; }

// ═══════════════════════════════════════════════════════════
//  BACKGROUNDS
// ═══════════════════════════════════════════════════════════
function drawOficina() {
  // Techo
  rect(0,0,GW,13,'#100c2a');
  // Lámparas de techo
  for(let lx=40;lx<GW;lx+=80){
    rect(lx,9,12,5,'#2a2244');
    rect(lx+3,13,6,2,'#ffffcc');
    // Cono de luz
    ctx.fillStyle='rgba(255,255,200,0.04)';
    ctx.beginPath();
    ctx.moveTo(px(lx+3),px(15));
    ctx.lineTo(px(lx+6),px(15));
    ctx.lineTo(px(lx+20),px(FLOOR_Y));
    ctx.lineTo(px(lx-14),px(FLOOR_Y));
    ctx.closePath();
    ctx.fill();
  }
  // Pared
  rect(0,13,GW,87,'#1e2a50');
  hline(0,13,GW,'#28355e');
  hline(0,15,GW,'#222e58');
  // Zócalo
  rect(0,97,GW,4,'#141830');
  hline(0,98,GW,'#1e2640');
  // Suelo tarima de madera
  rect(0,FLOOR_Y,GW,43,'#1c1208');
  for(let x=0;x<GW;x+=18) vline(x,FLOOR_Y,43,'#201508');
  for(let y=FLOOR_Y;y<143;y+=14) hline(0,y,GW,'#201508');
  // Reflejos en suelo
  ctx.fillStyle='rgba(255,220,150,0.03)';
  ctx.fillRect(0,px(FLOOR_Y),px(GW),px(43));

  // Ventanas
  drawWindow(165,18,62,65);
  drawWindow(243,18,62,65);

  // Logo empresa
  ctx.save();
  ctx.font="bold 10px 'Press Start 2P'";
  ctx.fillStyle='#ffcc00';
  ctx.fillText('AdmiraNext',px(22),px(46));
  ctx.font="5px 'Press Start 2P'";
  ctx.fillStyle='#555888';
  ctx.fillText('TEAM CONTROL PANEL v0.4',px(26),px(57));
  ctx.restore();
  hline(20,60,160,'#252850');

  // Mesas
  drawDesk(10,93,38); drawDesk(52,90,38); drawDesk(94,93,38);
  drawDesk(137,90,38); drawDesk(178,93,38); drawDesk(221,90,38);
  drawDesk(260,93,38);

  // Puerta derecha → Consejo
  rect(304,62,16,42,'#28180a');
  rect(305,63,14,40,'#1e1008');
  rect(306,65,5,16,'#241208'); // panel superior
  rect(306,83,5,16,'#241208'); // panel inferior
  dot(307,76,'#ccaa00'); dot(307,77,'#ccaa00'); // pomo
  ctx.save();
  ctx.font="4px 'Press Start 2P'";
  ctx.fillStyle='#ffcc44';
  ctx.fillText('CONSEJO',px(288),px(60));
  ctx.restore();
}

function drawConsejo() {
  // Techo
  rect(0,0,GW,13,'#060610');
  // Araña de techo
  rect(148,6,24,6,'#1a1428');
  rect(152,4,16,3,'#221c36');
  for(let cx=150;cx<172;cx+=4){ vline(cx,11,4,'#ccaa44'); dot(cx,15,'#ffee88'); }

  // Pared formal
  rect(0,13,GW,87,'#0e0e24');
  hline(0,13,GW,'#161630');
  // Panel decorativo
  rect(0,80,GW,12,'#0a0a1e');
  hline(0,81,GW,'#181838'); hline(0,91,GW,'#181838');
  for(let x=0;x<GW;x+=40){ vline(x,81,10,'#141430'); }

  // Suelo mármol oscuro
  rect(0,FLOOR_Y,GW,43,'#08081a');
  for(let x=0;x<GW;x+=32) vline(x,FLOOR_Y,43,'#0c0c20');
  for(let y=FLOOR_Y;y<143;y+=24) hline(0,y,GW,'#0c0c20');
  ctx.fillStyle='rgba(100,100,200,0.03)';
  ctx.fillRect(0,px(FLOOR_Y),px(GW),px(43));

  // Mesa del consejo
  drawBoardTable();

  // Retratos enmarcados
  const roles=['CEO','CFO','COO','CTO','CCO','CSO','CXO','CDO'];
  for(let i=0;i<8;i++) drawPortrait(14+i*38,16,28,42,roles[i]);

  // Puerta izquierda ← Equipo
  rect(0,62,16,42,'#28180a');
  rect(1,63,14,40,'#1e1008');
  rect(3,65,5,16,'#241208');
  rect(3,83,5,16,'#241208');
  dot(12,76,'#ccaa00'); dot(12,77,'#ccaa00');
  ctx.save();
  ctx.font="4px 'Press Start 2P'";
  ctx.fillStyle='#ffcc44';
  ctx.fillText('EQUIPO',px(2),px(60));
  ctx.restore();

  // Título sala
  ctx.save();
  ctx.font="bold 7px 'Press Start 2P'";
  ctx.fillStyle='#33338a';
  ctx.fillText('SALA DEL CONSEJO',px(68),px(12));
  ctx.restore();
}

function drawWindow(gx,gy,gw,gh){
  rect(gx,gy,gw,gh,'#070f28');
  // Estrellas
  const ss=[[4,5],[12,14],[25,8],[42,20],[53,9],[17,30],[34,37],[6,42],[50,28],[30,15],[45,50],[8,55]];
  for(const[sx,sy] of ss) if(sx<gw&&sy<gh) dot(gx+sx,gy+sy,'#ffffff');
  // Luna
  rect(gx+gw-18,gy+6,12,12,'#ffffc8');
  rect(gx+gw-16,gy+7,10,10,'#ffffc0');
  rect(gx+gw-12,gy+7,6,10,'#070f28');
  // Marco madera
  const fc='#7a5818';
  hline(gx-1,gy-1,gw+2,fc); hline(gx-1,gy+gh,gw+2,fc);
  vline(gx-1,gy-1,gh+2,fc); vline(gx+gw,gy-1,gh+2,fc);
  vline(gx+Math.floor(gw/2),gy,gh,fc);
  hline(gx,gy+Math.floor(gh/2),gw,fc);
  // Reflejo vidrio
  rect(gx,gy,2,6,'#ffffff11');
}

function drawDesk(gx,gy,gw){
  const gh=7;
  rect(gx,gy,gw,gh,'#5c3d1a');
  hline(gx,gy,gw,'#6a4820');
  rect(gx,gy+gh,gw,3,'#3d2810');
  // Monitor
  const mx=gx+Math.floor(gw/2)-9;
  rect(mx,gy-15,18,15,'#111118');
  rect(mx+1,gy-14,16,13,'#0a1a0a');
  rect(mx+2,gy-13,14,11,'#001800');
  rect(mx+3,gy-12,10,1,'#00cc00');
  rect(mx+3,gy-10,7,1,'#009900');
  rect(mx+3,gy-8,12,1,'#00cc00');
  if(Math.floor(G.tick/20)%2===0) dot(mx+14,gy-8,'#00ff44');
  rect(mx+7,gy,4,2,'#33333a');
  rect(mx+5,gy+2,8,1,'#33333a');
  rect(gx+2,gy+1,16,3,'#222230');
  hline(gx+3,gy+1,14,'#2e2e40');
}

function drawBoardTable(){
  const tx=55,ty=70,tw=210,th=30;
  rect(tx,ty,tw,th,'#271708');
  rect(tx+1,ty+1,tw-2,th-2,'#321e0a');
  hline(tx+2,ty+2,tw-4,'#482e10');
  hline(tx,ty+th-1,tw,'#180e04');
  rect(tx+4,ty+th,6,12,'#1c1006');
  rect(tx+tw-10,ty+th,6,12,'#1c1006');
}

function drawPortrait(gx,gy,gw,gh,role){
  rect(gx-1,gy-1,gw+2,gh+2,'#7a6010');
  hline(gx,gy,gw,'#aa8820');
  rect(gx,gy,gw,gh,'#16100a');
  rect(gx+7,gy+7,14,20,'#b87040');
  dot(gx+9,gy+12,'#1a0800'); dot(gx+16,gy+12,'#1a0800');
  rect(gx+5,gy+27,18,15,'#0c0c1e');
  const rc=ROLE_COLOR[role]||'#334466';
  rect(gx+13,gy+28,3,12,rc);
  ctx.save();
  ctx.font="5px 'Press Start 2P'";
  ctx.fillStyle='#ffcc44';
  ctx.fillText(role,px(gx+4),px(gy+gh+8));
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  PERSONAJE EQUIPO — SPRITES ESTILO LUCASARTS
// ═══════════════════════════════════════════════════════════
function drawCharacter(gx,gy,machine,hovered,selected,anim){
  const status=machine.status||'offline';
  const sc=STATUS_COLOR[status]||'#555577';
  const sh=STATUS_HI[status]||'#888899';
  const sd=STATUS_SH[status]||'#222233';
  const t=G.tick+anim;

  const h=hashStr(machine.memberName||machine.id||'x');
  const HAIRS=['#1a0800','#3d2010','#888860','#cc8820','#2a1040'];
  const SKINS=['#e8b080','#d4956a','#c07845','#f0c090'];
  const EYES =['#224488','#226622','#882222','#886622'];
  const hair=HAIRS[h%5]; const skin=SKINS[h%4]; const eye=EYES[h%4];
  const pant='#1a2044'; const shoe='#211810';
  const O='#0a0812';

  const blink=t%80<3;
  const sw=Math.round(Math.sin(t*0.05)*2);

  // Sombra
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.fillRect(px(gx-1),px(gy+43),px(22),px(4));

  // ── Zapatos ──
  rect(gx,gy+38,9,5,O);   rect(gx+1,gy+38,7,4,shoe);
  hline(gx+2,gy+38,4,'#3a2a18'); dot(gx+7,gy+41,'#150e05');
  rect(gx+11,gy+38,9,5,O); rect(gx+11,gy+38,7,4,shoe);
  hline(gx+12,gy+38,4,'#3a2a18');

  // ── Piernas ──
  rect(gx+2,gy+27,7,12,O);  rect(gx+3,gy+27,5,11,pant);
  hline(gx+3,gy+27,2,'#2a3266'); vline(gx+7,gy+27,11,'#10162e');
  hline(gx+4,gy+33,4,'#10162e');
  rect(gx+11,gy+27,7,12,O); rect(gx+11,gy+27,5,11,pant);
  hline(gx+11,gy+27,2,'#2a3266'); vline(gx+15,gy+27,11,'#10162e');
  hline(gx+12,gy+33,4,'#10162e');

  // ── Cinturón ──
  rect(gx+2,gy+25,16,3,O);  rect(gx+3,gy+25,14,2,'#664422');
  rect(gx+8,gy+24,4,4,O);   rect(gx+9,gy+24,2,3,'#ddbb55');
  dot(gx+9,gy+24,'#eecc66');

  // ── Cuerpo / camisa ──
  rect(gx+2,gy+12,16,14,O); rect(gx+3,gy+12,14,13,sc);
  hline(gx+4,gy+12,8,sh);   vline(gx+3,gy+12,5,sh);
  hline(gx+4,gy+24,12,sd);  vline(gx+15,gy+13,11,sd);
  hline(gx+6,gy+18,6,sd);   // pliegue camisa
  rect(gx+13,gy+15,4,4,O);  rect(gx+13,gy+15,3,3,sd); hline(gx+13,gy+15,3,sc); // bolsillo
  // Cuello camisa
  rect(gx+8,gy+11,4,3,O);
  rect(gx+8,gy+11,2,2,'#f8f8e8'); rect(gx+10,gy+11,2,2,'#f8f8e8');

  // ── Brazos ──
  rect(gx+0,gy+12+sw,3,14,O);  rect(gx+0,gy+12+sw,2,13,sc);
  hline(gx+0,gy+12+sw,1,sh);
  rect(gx-1,gy+25+sw,4,4,O);   rect(gx+0,gy+25+sw,3,3,skin);
  dot(gx+0,gy+25+sw,lighten(skin,20));

  rect(gx+17,gy+12-sw,3,14,O); rect(gx+17,gy+12-sw,2,13,sc);
  hline(gx+17,gy+12-sw,1,sh);
  rect(gx+17,gy+25-sw,4,4,O);  rect(gx+17,gy+25-sw,3,3,skin);
  dot(gx+17,gy+25-sw,lighten(skin,20));

  // ── Cuello ──
  rect(gx+8,gy+9,4,4,O); rect(gx+8,gy+9,3,3,skin);
  vline(gx+10,gy+9,3,darken(skin,25));

  // ── Cabeza ──
  rect(gx+3,gy+1,14,10,O); rect(gx+4,gy+1,12,9,skin);
  dot(gx+4,gy+5,lighten(skin,15)); dot(gx+5,gy+5,lighten(skin,10));
  vline(gx+14,gy+3,6,darken(skin,30)); hline(gx+5,gy+9,8,darken(skin,20));
  dot(gx+3,gy+5,skin); dot(gx+3,gy+6,skin); // orejas
  dot(gx+15,gy+5,skin); dot(gx+15,gy+6,skin);

  // ── Pelo ──
  rect(gx+4,gy+0,12,3,O); rect(gx+5,gy+0,10,2,hair);

}

function drawTag(gx,gy,name,sel,hov,fc){
  const s=String(name).substring(0,8);
  ctx.save();
  ctx.font="5px 'Press Start 2P'";
  const tw=ctx.measureText(s).width;
  const nx=px(gx+8)-tw/2;
  ctx.fillStyle='rgba(0,0,0,0.8)';
  ctx.fillRect(nx-2,px(gy),tw+4,9);
  ctx.fillStyle=fc?fc:(sel?'#ffff44':(hov?'#ffffff':'#aaaacc'));
  ctx.fillText(s,nx,px(gy)+7);
  ctx.restore();
}

//  VERB UI (dibujada dentro del canvas, y=143–200)

function drawVerbUI(){

  rect(0,SCENE_H,GW,GH-SCENE_H,'#14091e');
  hline(0,SCENE_H,GW,'#2a1040');
  // Separador vertical inventario
  vline(218,SCENE_H,GH-SCENE_H,'#1e0c2e');

  // Texto de acción actual (arriba del área de verbos)
  ctx.save();
  ctx.font="7px 'Press Start 2P'";
  ctx.fillStyle='#ffffff';
  ctx.fillText(G.actionText,px(5),px(SCENE_H+9));
  ctx.restore();

  // Verbos (3×3) — texto magenta estilo Monkey Island
  ctx.save();
  ctx.font="7px 'Press Start 2P'";
  VERBS.forEach((v,i)=>{
    const col=i%3, row=Math.floor(i/3);
    const vx=VERB_COL_X[col], vy=VERB_ROW_Y[row];

    const isHov=G.verbHover===v.id;

    ctx.fillText(v.label,px(vx),px(vy));
  });

  // Área inventario / estado (derecha)
  rect(219,SCENE_H+1,GW-219,GH-SCENE_H-1,'#0e0618');

  // Máquinas como pills en el inventario
  const all=[...G.machines,...G.consejeros];
  ctx.save();
  ctx.font="4px 'Press Start 2P'";
  all.forEach((m,i)=>{
    const col=i%2, row=Math.floor(i/2);
    const ix=221+col*50, iy=SCENE_H+5+row*13;
    if(iy>GH-6) return;
    const sc=STATUS_COLOR[m.status]||'#555577';
    rect(ix,iy,6,6,sc);
    hline(ix,iy,3,lighten(sc,30)); // LED highlight
    ctx.fillStyle='#aa88cc';
    ctx.fillText((m.memberName||m.role||m.id||'?').substring(0,6),px(ix+8),px(iy+5));
  });
  ctx.restore();

  // Botones de navegación en el inventario
  ctx.save();
  ctx.font="5px 'Press Start 2P'";
  if(G.scene==='oficina'){
    ctx.fillStyle='#6666aa';
    ctx.fillText('CONSEJO ▶',px(220),px(192));
  } else {
    ctx.fillStyle='#6666aa';
    ctx.fillText('◀ EQUIPO',px(220),px(192));
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  HIT TESTING
// ═══════════════════════════════════════════════════════════
function canvasGamePos(clientX,clientY){
  const r=canvas.getBoundingClientRect();
  return[(clientX-r.left)*(canvas.width/r.width)/P,
         (clientY-r.top)*(canvas.height/r.height)/P];
}

function getCharAt(cx,cy){
  if(cy>=SCENE_H) return null;
  const chars=G.scene==='oficina'?G.machines:G.consejeros;
  const poses=G.scene==='oficina'?POS_OFICINA:POS_CONSEJO;
  for(let i=0;i<chars.length;i++){
    if(i>=poses.length) break;
    const[px2,py2]=poses[i];
    if(cx>=px2-3&&cx<=px2+23&&cy>=py2-7&&cy<=py2+46) return chars[i];
  }
  return null;
}

function getDoorAt(gx,gy){
  if(gy>=SCENE_H) return null;
  if(G.scene==='oficina'&&gx>=298&&gy>=58&&gy<=108) return'consejo';
  if(G.scene==='consejo'&&gx<=18 &&gy>=58&&gy<=108) return'oficina';
  return null;
}

function getVerbAt(gx,gy){
  if(gy<SCENE_H||gx>=218) return null;
  const col=Math.floor(gx/(218/3));
  const row=Math.floor((gy-SCENE_H)/((GH-SCENE_H)/3));
  if(col<0||col>2||row<0||row>2) return null;
  return VERBS[row*3+col]||null;
}

function getNavAt(gx,gy){
  if(gy>=186&&gy<=196&&gx>=218&&gx<=318) return true;
  return false;
}

// ═══════════════════════════════════════════════════════════
//  ACCIONES DE VERBOS
// ═══════════════════════════════════════════════════════════
function runVerb(vid,machine){
  if(!machine) return;
  const name=machine.memberName||machine.role||machine.id||'?';
  const status=machine.status||'offline';
  const sc=STATUS_COLOR[status]||'#aaa';

  switch(vid){
    case'mirar': case'abrir':{
      setNarr(`Miras a ${name}. Estado: ${status}.`);
      const ck=machine.checklist||{};
      const done=Object.values(ck).filter(Boolean).length;
      const total=Object.keys(ck).length;
      showDialog(`${vid==='abrir'?'ABRIR':'MIRAR'} · ${name}`,`
        <b>Miembro:</b> ${name}<br>
        <b>Rol:</b> ${machine.machineRole||machine.role||'-'}<br>
        <b>Área:</b> ${machine.area||'-'}<br>
        <b>Máquina:</b> ${machine.machineName||'-'}<br>
        <b>Estado:</b> <span style="color:${sc}">${status.toUpperCase()}</span><br>
        <b>Checklist:</b> ${done}/${total}<br>
        ${total?Object.entries(ck).map(([k,v])=>`<span style="color:${v?'#44ff88':'#ff4444'}">${v?'✓':'✗'}</span> ${k}`).join('&nbsp;&nbsp;'):'(vacío)'}`);
      break;
    }
    case'hablar':{
      const focus=machine.currentFocus||machine.intake?.currentFocus||'Sin actividad.';
      setNarr(`${name}: "${focus.substring(0,80)}"`);
      showDialog(`HABLAR CON · ${name}`,`
        <b>Foco:</b><br>${focus}<br>
        ${machine.notes||machine.intake?.helpNeeded?`<br><b>Notas:</b><br>${machine.notes||machine.intake?.helpNeeded}`:''}`);
      break;
    }
    case'usar':{
      const cmd=machine.sshConnectCommand||'';
      setNarr(`Usas SSH para conectar a ${machine.machineName||name}.`);
      showDialog(`USAR · ${name}`,`
        <b>SSH:</b><br><code>${cmd||'No configurado'}</code><br><br>
        ${cmd?`<button onclick="copySSH('${cmd.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')"\
          style="background:#002;border:1px solid #060;color:#0f0;font-family:'Press Start 2P',monospace;font-size:6px;padding:4px 8px;cursor:pointer">COPIAR SSH</button>`:''}`);
      break;
    }
    case'empujar': case'dar':{
      setNarr(`Preparando comando para ${name}...`);
      closeDialog(); openCmd(machine); break;
    }
    case'coger':{
      setNarr(`Cogiendo estado de ${name}...`); doSync(machine); break;
    }
    case'tirar': case'cerrar':{
      setNarr(`Tirando del historial de ${name}...`); doHistory(machine); break;
    }
  }
}

function setActionText(){
  const v=VERBS.find(x=>x.id===G.verb);
  const vl=v?v.label:'';
  if(G.hover){
    const chars=[...G.machines,...G.consejeros];
    const m=chars.find(x=>x.id===G.hover);
    if(m) { G.actionText=vl+' '+((m.memberName||m.role||m.id)||''); return; }
  }
  G.actionText=vl;
}

// ═══════════════════════════════════════════════════════════
//  DIALOGO, COMANDO, SYNC, HISTORY, SSH
// ═══════════════════════════════════════════════════════════
function showDialog(title,html){
  document.getElementById('dialog-title').textContent=title;
  document.getElementById('dialog-body').innerHTML=html;
  document.getElementById('dialog-layer').style.display='flex';
}
function closeDialog(){ document.getElementById('dialog-layer').style.display='none'; }
function setNarr(t){ G.lastNarr=t; G.actionText=t.substring(0,36); }

function openCmd(machine){
  G.cmdTarget=machine;
  const a=document.getElementById('command-area');
  a.style.display='flex';
  document.getElementById('command-label').textContent=`> ${(machine.memberName||machine.id||'').substring(0,10)}:`;
  const inp=document.getElementById('command-input');
  inp.value=''; inp.focus();
}
document.getElementById('command-cancel').onclick=()=>{
  document.getElementById('command-area').style.display='none'; G.cmdTarget=null;
};
document.getElementById('command-send').onclick=async()=>{
  if(!G.cmdTarget) return;
  const prompt=document.getElementById('command-input').value.trim();
  if(!prompt) return;
  const name=G.cmdTarget.memberName||G.cmdTarget.id;
  setNarr(`Enviando a ${name}...`);
  document.getElementById('command-area').style.display='none';
  try{
    const res=await fetch('/api/teamwork/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({machineId:G.cmdTarget.id,prompt})});
    const d=await res.json();
    setNarr(`Comando enviado a ${name}.`);
    showDialog('RESPUESTA',`<pre style="font-size:6px;white-space:pre-wrap;color:#aaffaa">${JSON.stringify(d,null,2).substring(0,600)}</pre>`);
  }catch(e){ setNarr(`Error: ${e.message}`); }
  G.cmdTarget=null;
};
document.getElementById('command-input').addEventListener('keydown',e=>{
  if(e.key==='Enter') document.getElementById('command-send').click();
  if(e.key==='Escape') document.getElementById('command-cancel').click();
});

async function doSync(m){
  try{
    const res=await fetch(`/api/machines/${m.id}/sync`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:m.status})});
    const d=await res.json();
    setNarr(`Sync OK — ${m.memberName||m.id}.`);
    showDialog('SYNC OK',`Estado cogido.<br><br><code>${JSON.stringify(d).substring(0,300)}</code>`);
    loadMachines();
  }catch(e){ setNarr(`Error: ${e.message}`); }
}
async function doHistory(m){
  try{
    const res=await fetch('/api/teamwork/history');
    const d=await res.json();
    const hist=(Array.isArray(d)?d:(d.history||d.entries||[]))
      .filter(h=>!m.id||h.machineId===m.id||h.targetId===m.id).slice(0,6);
    showDialog(`HISTORIAL · ${m.memberName||m.id}`,
      hist.length?hist.map(h=>`<div style="margin-bottom:5px;border-bottom:1px solid #1a1a3a;padding-bottom:5px">
        <span style="color:#556">${(h.timestamp||'').substring(0,16)}</span><br>
        ${(h.prompt||h.command||JSON.stringify(h)).substring(0,100)}</div>`).join('')
      :'(sin registros)');
  }catch(e){ showDialog('HISTORIAL',`Error: ${e.message}`); }
}
function copySSH(cmd){
  navigator.clipboard.writeText(cmd).then(()=>{ setNarr('Comando SSH copiado.'); closeDialog(); });
}

// ═══════════════════════════════════════════════════════════
//  NAVEGACIÓN
// ═══════════════════════════════════════════════════════════
function goTo(scene){
  G.scene=scene; G.selected=null; closeDialog();
  const msgs={
    oficina:'Sala de Control AdmiraNext. El equipo trabaja en silencio.',
    consejo:'Sala del Consejo. Ocho consejeros te observan.',
  };
  setNarr(msgs[scene]||'');
  document.getElementById('scene-id').textContent=`SALA: ${scene.toUpperCase()}`;
}

// ═══════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════
canvas.addEventListener('mousemove',e=>{
  const[gx,gy]=canvasGamePos(e.clientX,e.clientY);
  const char=getCharAt(gx,gy);
  const door=getDoorAt(gx,gy);
  const verb=getVerbAt(gx,gy);
  const nav =getNavAt(gx,gy);
  G.hover=char?char.id:null;
  G.verbHover=verb?verb.id:null;
  canvas.style.cursor=(char||door||verb||nav)?'pointer':'crosshair';
  setActionText();
});

canvas.addEventListener('mouseleave',()=>{
  G.hover=null; G.verbHover=null; G.actionText=G.lastNarr.substring(0,36);
});

canvas.addEventListener('click',e=>{
  const[gx,gy]=canvasGamePos(e.clientX,e.clientY);

  // Click en verbo
  const verb=getVerbAt(gx,gy);
  if(verb){ G.verb=verb.id; G.actionText=verb.label; return; }

  // Click en nav inventario
  if(getNavAt(gx,gy)){
    goTo(G.scene==='oficina'?'consejo':'oficina'); return;
  }

  // Click en puerta
  const door=getDoorAt(gx,gy);
  if(door){ goTo(door); return; }

  // Click en personaje
  const char=getCharAt(gx,gy);
  if(char){ G.selected=char.id; runVerb(G.verb,char); return; }

  // Click vacío
  const ambs=[
    'El aire huele a café y código.',
    'Un servidor zumba en la distancia.',
    'Nada de interés aquí.',
    'El suelo refleja la luz de los monitores.',
    '404: objeto no encontrado.',
    'Solo se oyen los teclados.',
  ];
  setNarr(ambs[Math.floor(Math.random()*ambs.length)]);
});

// ═══════════════════════════════════════════════════════════
//  DATOS
// ═══════════════════════════════════════════════════════════
async function loadMachines(){
  try{
    const res=await fetch('/api/machines');
    const d=await res.json();
    const all=Array.isArray(d)?d:(d.machines||[]);
    G.machines=all.filter(m=>m.unitType!=='council').slice(0,8);
    G.consejeros=all.filter(m=>m.unitType==='council').slice(0,8);
    if(!G.consejeros.length) fallbackConsejeros();
  }catch{
    G.machines=[
      {id:'m1',memberName:'Carlos', machineRole:'Dev Lead', status:'online',  machineName:'MacBook Pro'},
      {id:'m2',memberName:'Ana',    machineRole:'Diseñadora',status:'busy',   machineName:'iMac Studio'},
      {id:'m3',memberName:'Luis',   machineRole:'Backend',  status:'idle',    machineName:'Mac Mini'},
      {id:'m4',memberName:'Marta',  machineRole:'Frontend', status:'online',  machineName:'MacBook Air'},
      {id:'m5',memberName:'Javi',   machineRole:'DevOps',   status:'maintenance',machineName:'Mac Pro'},
    ];
    fallbackConsejeros();
  }
}
function fallbackConsejeros(){
  G.consejeros=['CEO','CFO','COO','CTO','CCO','CSO','CXO','CDO'].map(role=>({
    id:`c-${role.toLowerCase()}`,role,memberName:role,status:'idle',
  }));
}

// ═══════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════
function loop(){
  G.tick++;
  ctx.clearRect(0,0,CW,CH);

  if(G.scene==='oficina') drawOficina();
  else                    drawConsejo();

  const chars=G.scene==='oficina'?G.machines:G.consejeros;
  const poses=G.scene==='oficina'?POS_OFICINA:POS_CONSEJO;
  chars.forEach((m,i)=>{
    if(i>=poses.length) return;
    const[gx,gy]=poses[i];
    const hov=G.hover===m.id, sel=G.selected===m.id;
    if(G.scene==='oficina') drawCharacter(gx,gy,m,hov,sel,i*13);
    else                    drawConsejero(gx,gy,m,hov,sel,i*17);
  });

  drawVerbUI();
  requestAnimationFrame(loop);
}

document.fonts.ready.then(()=>{
  loadMachines();
  loop();
  setInterval(loadMachines,30_000);
});
</script>
