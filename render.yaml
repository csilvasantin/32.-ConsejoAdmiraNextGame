services:
  - type: web
    name: consejo-admira-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: COUNCIL_API_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      # ── Auth real (Google SSO) ──
      - key: GOOGLE_CLIENT_ID          # OAuth Web Client ID (publico)
        sync: false
      - key: COUNCIL_ALLOWED_EMAILS    # correos con acceso, separados por comas
        sync: false
      - key: COUNCIL_MACHINE_TOKEN     # secreto SOLO servidor (hermes/agora/scripts)
        sync: false
    disk:
      name: council-data
      mountPath: /opt/render/project/src/presentations
      sizeGB: 1
