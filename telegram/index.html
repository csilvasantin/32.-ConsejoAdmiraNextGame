<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram · Consejo AdmiraNext</title>
<script src="/auth-gate.js"></script>
<script src="/admira-bar.js?v=scumm2"></script>
<style>
  :root{
    --bg:#0a0a14; --panel:#0d0b1a; --border:#1a1428;
    --gold:#daa520; --green:#9effb0; --cyan:#8cf; --dim:#666; --text:#e8e8f0;
    --in:#141225; --out:#0f3a2f;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:'Andale Mono','Monaco','Menlo',monospace; display:flex;
    flex-direction:column; align-items:center;
  }
  .wrap{width:100%; max-width:760px; display:flex; flex-direction:column; height:100vh}
  html.admira-bar-on .wrap{height:calc(100vh - 94px)}
  header{
    padding:14px 18px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px; background:var(--panel);
  }
  header .logo{font-size:22px}
  header h1{font-size:15px; margin:0; color:var(--gold); letter-spacing:.5px}
  header .sub{font-size:11px; color:var(--dim); margin-top:2px}
  header #clearBtn{margin-left:auto; background:#1a1428; color:var(--gold); border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:11px; padding:6px 10px; cursor:pointer}
  header #clearBtn:hover{border-color:var(--gold)}
  header .status{margin-left:12px; font-size:11px; color:var(--dim); display:flex; align-items:center; gap:6px}
  .dot{width:8px; height:8px; border-radius:50%; background:var(--dim)}
  .dot.live{background:var(--green); box-shadow:0 0 8px var(--green)}
  #feed{
    flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:10px;
  }
  .msg{max-width:80%; padding:8px 12px; border-radius:10px; background:var(--in);
    border:1px solid var(--border); align-self:flex-start; animation:in .2s ease}
  .msg.out{align-self:flex-end; background:var(--out); border-color:#155}
  .msg.err{align-self:stretch; max-width:100%; background:#2a0f12; border-color:#7a3030}
  .msg.err .who{color:#ff8a8a}
  .msg.err .body{color:#ffd0d0; user-select:text; -webkit-user-select:text; font-family:'Andale Mono',monospace; font-size:12px}
  .msg .who{font-size:11px; color:var(--gold); margin-bottom:3px}
  .msg.out .who{color:var(--green)}
  .msg .body{font-size:14px; white-space:pre-wrap; word-break:break-word; line-height:1.4}
  .msg .media{display:block; max-width:240px; max-height:260px; border-radius:8px; margin:2px 0 4px; cursor:zoom-in; border:1px solid var(--border); background:#000}
  .msg .media.sticker{max-width:140px; max-height:140px; border:none; background:transparent}
  .msg .time{font-size:10px; color:var(--dim); margin-top:4px; text-align:right}
  #lb{position:fixed; inset:0; background:rgba(0,0,0,.92); display:none; align-items:center; justify-content:center; z-index:50; cursor:zoom-out; padding:20px}
  #lb img{max-width:100%; max-height:100%; border-radius:8px}
  @keyframes in{from{opacity:0; transform:translateY(6px)}to{opacity:1}}
  .empty{color:var(--dim); text-align:center; margin:auto; font-size:13px}
  footer{
    border-top:1px solid var(--border); padding:12px; background:var(--panel);
    display:flex; flex-direction:column; gap:8px;
  }
  .row{display:flex; gap:8px}
  input,textarea,select,button{
    font-family:inherit; font-size:14px; background:#000; color:var(--text);
    border:1px solid var(--border); border-radius:8px; padding:10px;
  }
  #consejero{flex:1}
  .selrow label{font-size:11px; color:var(--gold); white-space:nowrap}
  #text{flex:1; resize:none; min-height:42px; max-height:120px}
  #send{background:var(--gold); color:#000; font-weight:bold; cursor:pointer; border:none; padding:0 18px}
  #send:disabled{opacity:.4; cursor:not-allowed}
  #key{flex:1}
  .keyrow{display:flex; gap:8px; align-items:center}
  .keyrow label{font-size:11px; color:var(--dim); white-space:nowrap}
  .hint{font-size:10px; color:var(--dim)}
  a{color:var(--cyan)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="logo">📡</span>
    <div>
      <h1>Telegram · Grupo AdmiraNext</h1>
      <div class="sub">Espejo en directo del consejo</div>
    </div>
    <button id="clearBtn" title="Limpiar la vista del chat (oculta los mensajes actuales; los nuevos siguen llegando)">🧹 Limpiar</button>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">conectando…</span></div>
  </header>

  <div id="feed"><div class="empty">Cargando mensajes…</div></div>

  <footer>
    <div class="row selrow" style="align-items:center">
      <label>💬 Para</label>
      <select id="botSel">
        <option value="White Rabbit" selected>White Rabbit (por defecto)</option>
        <option value="Morfeo">Morfeo</option>
        <option value="Neo">Neo</option>
        <option value="Trinity">Trinity</option>
        <option value="Oráculo">Oráculo</option>
        <option value="Cypher">Cypher</option>
        <option value="Smith">Smith</option>
      </select>
      <button id="consultBtn" title="Consultar al bot: el mensaje va al grupo y te responde">Consultar</button>
    </div>
    <div class="row selrow" style="align-items:center">
      <label>📨 Enviar a</label>
      <select id="machineSel"><option value="" disabled>cargando equipos…</option></select>
      <button id="sendMachineBtn" title="Enviar el mensaje directamente al Claude Code de ese equipo">Enviar</button>
    </div>
    <div class="row">
      <textarea id="text" placeholder="Escribe el mensaje…"></textarea>
    </div>
    <div class="hint"><strong>💬 Consultar</strong> → al bot (responde en el grupo). <strong>📨 Enviar</strong> → al Claude Code del equipo. Enter manda al último que usaste. Con tu login de Google, sin clave.</div>
  </footer>
</div>
<div id="lb"><img alt=""></div>

<script>
  // === Configuración ===
  // URL del Worker (rellénala tras desplegar): https://admira-telegram.<subdominio>.workers.dev
  let WORKER_BASE = localStorage.getItem("tg_worker_base") || "";
  // Auto-conexión inmune a deploys: en admira.live, si falta la URL, fijarla Y persistirla en el navegador.
  if(!WORKER_BASE && location.hostname.endsWith("admira.live")){ WORKER_BASE="https://admira-telegram.csilvasantin.workers.dev"; try{localStorage.setItem("tg_worker_base",WORKER_BASE);}catch(e){} }
  const POLL_MS = 4000;
  // Servicio de control del Mini: /sendto enruta al Claude Code de una máquina
  // (NO se postea al grupo ni a White Rabbit). Usa la "Clave operador" del Consejo.
  const MINI_BASE = "https://macmini.tail48b61c.ts.net";
  // El backend valida el LOGIN DE GOOGLE en servidor. Nos apoyamos en él y NO pedimos
  // password: si el id_token caducó (~1h) lo refrescamos solo (One Tap). Una clave ya
  // guardada queda como red de seguridad silenciosa.
  const COUNCIL_GOOGLE_CLIENT_ID = "861856772040-e1ri6kpu6maagtb6crdfbb923hsaalgb.apps.googleusercontent.com";
  function _jwtExpMs(t){ try{ var p=JSON.parse(atob(String(t).split(".")[1].replace(/-/g,"+").replace(/_/g,"/"))); return (p.exp||0)*1000; }catch(e){ return 0; } }
  function councilGateCred(){ try{ var g=JSON.parse(localStorage.getItem("admira_gate")||"null"); if(!g||!g.cred||String(g.cred).split(".").length!==3) return ""; return (_jwtExpMs(g.cred)>Date.now()+30000)?g.cred:""; }catch(e){ return ""; } }
  function councilStoredKey(){ try{ return localStorage.getItem("admira:agora-key")||sessionStorage.getItem("admira:agora-key")||""; }catch(e){ return ""; } }
  function _ensureGIS(){ return new Promise(function(res){ if(window.google&&google.accounts&&google.accounts.id) return res(true); var s=document.createElement("script"); s.src="https://accounts.google.com/gsi/client"; s.async=true; s.defer=true; s.onload=function(){res(true);}; s.onerror=function(){res(false);}; (document.head||document.documentElement).appendChild(s); }); }
  function refreshGoogleCred(){ return new Promise(function(resolve){
    _ensureGIS().then(function(okGis){
      if(!okGis||!(window.google&&google.accounts&&google.accounts.id)) return resolve("");
      var done=false; function fin(v){ if(done)return; done=true; resolve(v||""); }
      try{
        google.accounts.id.initialize({ client_id:COUNCIL_GOOGLE_CLIENT_ID, auto_select:true, cancel_on_tap_outside:false,
          callback:function(resp){ try{ var g=JSON.parse(localStorage.getItem("admira_gate")||"{}"); g.cred=resp.credential; g.credAt=Date.now(); localStorage.setItem("admira_gate", JSON.stringify(g)); }catch(e){} fin(resp.credential); } });
        google.accounts.id.prompt(function(n){ try{ if((n.isNotDisplayed&&n.isNotDisplayed())||(n.isSkippedMoment&&n.isSkippedMoment())) fin(""); }catch(e){} });
      }catch(e){ fin(""); }
      setTimeout(function(){ fin(""); }, 5000);
    });
  }); }
  async function miniSend(body, cred){
    const r=await fetch(MINI_BASE+"/api/teamwork/send",{method:"POST",
      headers:{"content-type":"application/json","Authorization":"Bearer "+cred,"X-Council-Token":cred},
      body:JSON.stringify(body)});
    const d=await r.json().catch(()=>({})); return {status:r.status, ok:r.ok&&d.ok, d};
  }
  async function routeSendTo(machine, message, target){
    const body={machineId:machine,prompt:message,target:target};
    setStatus(true,"📨 enviando a "+machine+" ("+target+")…");
    try{
      let cred=councilGateCred();                                            // 1) login de Google vigente
      if(!cred){ setStatus(true,"🔄 refrescando tu login de Google…"); cred=await refreshGoogleCred(); }
      let res=cred?await miniSend(body,cred):null;
      if((!res||res.status===401||res.status===403)&&councilStoredKey()){    // 2) red de seguridad: clave ya guardada
        res=await miniSend(body,councilStoredKey());
      }
      if(res&&res.ok){ setStatus(true,"✅ enviado a "+(res.d.name||machine)+" — su Claude Code lo procesa"); textInput.value=""; }
      else if(!cred&&!councilStoredKey()){ setErr("login de Google caducado y sin refrescar — recarga la página para volver a entrar"); }
      else if(res&&(res.status===401||res.status===403)){ setErr("tu cuenta de Google no está autorizada en el backend para esto"); }
      else setErr("no se pudo enviar a "+machine+": "+(res&&res.d.error||("HTTP "+(res&&res.status))));
    }catch(e){ setErr("sin conexión con el Mini (Tailscale/control): "+(e&&e.message||e)); }
  }

  const feed = document.getElementById("feed");
  const dot = document.getElementById("dot");
  const statusText = document.getElementById("statusText");
  const textInput = document.getElementById("text");
  const botSel = document.getElementById("botSel");
  const machineSel = document.getElementById("machineSel");
  const consultBtn = document.getElementById("consultBtn");
  const sendMachineBtn = document.getElementById("sendMachineBtn");
  let _lastMode = "bot";   // qué hace Enter: el último selector que tocaste (bot por defecto)

  let lastId = 0;
  let CLEAR_BEFORE = parseInt(localStorage.getItem("tg_clear_before")||"0",10) || 0;   // oculta los mensajes con id <= este (limpieza local, persistente)

  function setStatus(live, txt){
    dot.classList.toggle("live", live);
    statusText.textContent = txt;
  }
  // Deja el error FIJO en el chat (seleccionable) para poder copiarlo — la barra de
  // estado se borra en cada refresco; esto persiste.
  function pushLocalError(text){
    const el = document.createElement("div");
    el.className = "msg err";
    const t = new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    el.innerHTML = `<div class="who">⚠️ Error</div><div class="body">${escapeHtml(text)}</div><div class="time">${t}</div>`;
    const emp = feed.querySelector(".empty"); if(emp) emp.remove();
    feed.appendChild(el);
    feed.scrollTop = feed.scrollHeight;
  }
  function setErr(text){ setStatus(false, text); pushLocalError(text); }
  // Rellena el selector «Enviar a» con la flota (origin-gated, sin auth).
  async function loadMachines(){
    try{
      const r = await fetch(MINI_BASE + "/api/council/assignees");
      const d = await r.json();
      const ms = (d.assignees || d.machines || []).filter(m => (m.kind||"machine")==="machine" && m.id);
      if(!ms.length) return;
      machineSel.innerHTML = ms.map(m => `<option value="${m.id}">${escapeHtml(m.label||m.name||m.id)}</option>`).join("");
      const prev = localStorage.getItem("tg_machine") || "admira-macbookpronegro14";
      machineSel.value = ms.some(m=>m.id===prev) ? prev : ms[0].id;
    }catch(e){ machineSel.innerHTML = '<option value="" disabled>(no se pudo cargar la flota)</option>'; }
  }
  // Consultar con un bot: el mensaje va al grupo (worker /api/send) con «→ <bot>».
  // Auth con tu login de Google (el worker lo valida); sin clave.
  async function consultBot(bot, text){
    if(!WORKER_BASE){ setStatus(false,"espejo no configurado"); return; }
    let cred = councilGateCred(); if(!cred){ setStatus(true,"🔄 refrescando login de Google…"); cred = await refreshGoogleCred(); }
    if(!cred){ setStatus(false,"login de Google caducado — recarga la página"); return; }
    setStatus(true,"💬 consultando a "+bot+"…");
    try{
      const r = await fetch(WORKER_BASE+"/api/send",{ method:"POST",
        headers:{"content-type":"application/json","Authorization":"Bearer "+cred},
        body: JSON.stringify({ text: text+" → "+bot, author: "Web" }) });
      const d = await r.json().catch(()=>({}));
      if(d.ok){ setStatus(true,"💬 enviado a "+bot+" — espera su respuesta"); poll(); }
      else if(r.status===401){ setErr("login de Google no autorizado en el espejo"); }
      else setErr("no se pudo consultar a "+bot+": "+(d.error||("HTTP "+r.status)));
    }catch(e){ setErr("sin conexión con el espejo: "+(e&&e.message||e)); }
  }
  function refreshSendState(){
    // Todo va con tu login de Google (sin clave): controles siempre activos.
    textInput.disabled = false;
    consultBtn.disabled = false;
    sendMachineBtn.disabled = false;
    textInput.placeholder = "Escribe el mensaje…";
  }
  function fmtTime(epoch){
    if(!epoch) return "";
    const d = new Date(epoch*1000);
    return d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
  }
  function render(msgs){
    if(lastId===0 && msgs.length) feed.innerHTML = "";
    for(const m of msgs){
      if(CLEAR_BEFORE && m.id <= CLEAR_BEFORE){ lastId = Math.max(lastId, m.id); continue; }   // ocultados por «Limpiar»
      const emp = feed.querySelector(".empty"); if(emp) emp.remove();   // quita el placeholder al llegar algo real
      const el = document.createElement("div");
      el.className = "msg" + (m.direction==="out" ? " out" : "");
      let media = "";
      if(m.media_type && WORKER_BASE){
        const src = `${WORKER_BASE}/api/media?id=${encodeURIComponent(m.id)}`;
        const cls = m.media_type==="sticker" ? "media sticker" : "media";
        media = `<img class="${cls}" src="${src}" alt="imagen" loading="lazy" onerror="this.remove()">`;
      }
      const body = m.text ? `<div class="body">${escapeHtml(m.text)}</div>` : "";
      el.innerHTML =
        `<div class="who">${escapeHtml(m.from_name||"Anónimo")}</div>`+
        media + body +
        `<div class="time">${fmtTime(m.date)}</div>`;
      const img = el.querySelector(".media");
      if(img) img.addEventListener("click", ()=>{ const lb=document.getElementById("lb"); lb.querySelector("img").src=img.src; lb.style.display="flex"; });
      feed.appendChild(el);
      lastId = Math.max(lastId, m.id);
    }
    if(msgs.length) feed.scrollTop = feed.scrollHeight;
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  async function poll(){
    if(!WORKER_BASE){
      setStatus(false,"en preparación");
      feed.innerHTML = '<div class="empty">📡 Conexión con el consejo en preparación.<br>Estará disponible en breve.</div>';
      return;
    }
    try{
      const r = await fetch(`${WORKER_BASE}/api/messages?after=${lastId}`);
      const data = await r.json();
      if(data.ok){ render(data.messages); setStatus(true,"en directo"); }
      else setStatus(false,"error");
    }catch(e){ setStatus(false,"sin conexión"); }
  }

  let _tgSending = false;   // evita disparos múltiples (Enter/clic repetidos → mensaje duplicado)
  // mode: "bot" (💬 consultar) | "machine" (📨 enviar al Claude Code del equipo).
  async function doSend(mode){
    if(_tgSending) return;
    const raw = textInput.value.trim();
    if(!raw) return;
    // /sendto explícito → siempre a ese equipo, mande quien mande
    const st = raw.match(/^\/sendto\s+(\S+)\s+([\s\S]+)$/i);
    if(/^\/sendto\b/i.test(raw) && !st){ setStatus(false,"uso: /sendto <equipo> <mensaje>"); return; }
    if(mode==="machine" && !st && !machineSel.value){ setStatus(false,"elige un ordenador en «Enviar a»"); return; }
    _tgSending = true; textInput.value = ""; consultBtn.disabled = true; sendMachineBtn.disabled = true;   // limpia y bloquea YA
    try{
      if(st){
        let machine = st[1].trim(), message = st[2].trim(), target = "claude";
        const tm = message.match(/^(claude|terminal)\s*:\s*([\s\S]+)$/i); if(tm){ target = tm[1].toLowerCase(); message = tm[2].trim(); }
        await routeSendTo(machine, message, target);
      } else if(mode==="machine"){
        await routeSendTo(machineSel.value, raw, "claude");                 // 📨 al equipo
      } else {
        await consultBot(botSel.value || "White Rabbit", raw);              // 💬 al bot
      }
    } finally{ _tgSending = false; refreshSendState(); }
  }

  consultBtn.onclick = ()=>{ _lastMode="bot"; doSend("bot"); };
  sendMachineBtn.onclick = ()=>{ _lastMode="machine"; doSend("machine"); };
  botSel.addEventListener("change", ()=>{ _lastMode="bot"; });
  machineSel.addEventListener("change", ()=>{ _lastMode="machine"; try{ localStorage.setItem("tg_machine", machineSel.value); }catch(e){} });
  textInput.addEventListener("keydown", e=>{
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); doSend(_lastMode); }
  });
  // 🧹 Limpiar: oculta los mensajes actuales en ESTA vista (no borra del grupo ni de D1);
  // los nuevos siguen llegando. Persistente por navegador.
  document.getElementById("clearBtn").onclick = ()=>{
    CLEAR_BEFORE = lastId;
    try{ localStorage.setItem("tg_clear_before", String(CLEAR_BEFORE)); }catch(e){}
    feed.innerHTML = '<div class="empty">🧹 Vista limpiada. Los mensajes nuevos aparecerán aquí.</div>';
  };

  // Cerrar el visor ampliado (lightbox).
  document.getElementById("lb").addEventListener("click", function(){ this.style.display="none"; });

  refreshSendState();
  loadMachines();
  poll();
  setInterval(poll, POLL_MS);
</script>
</body>
</html>
